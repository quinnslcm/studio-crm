      margin-top: 16px; border-radius: 1px; overflow: hidden;

/* ── Loading Screen ──────────────────────────────────────────────── */
function LoadingScreen({ onDone }) {
  const [pct, setPct] = React.useState(0);
  const [fadeOut, setFadeOut] = React.useState(false);
  const [statusLine, setStatusLine] = React.useState('initializing');
  const statusLines = ['initializing', 'loading profiles', 'syncing pipeline', 'building workspace', 'ready'];
  React.useEffect(() => {
    let t = 0;
    const steps = [
      { target: 22, speed: 35 },
      { target: 48, speed: 25 },
      { target: 72, speed: 38 },
      { target: 91, speed: 18 },
      { target: 100, speed: 12 },
    ];
    let current = 0;
    let step = 0;
    const tick = () => {
      if (step >= steps.length) {
        setTimeout(() => setFadeOut(true), 200);
        setTimeout(() => onDone(), 800);
        return;
      }
      const { target, speed } = steps[step];
      current++;
      setPct(current);
      if (current >= target) {
        step++;
        if (step < statusLines.length) setStatusLine(statusLines[step]);
      }
      t = setTimeout(tick, speed + Math.random() * 15);
    };
    t = setTimeout(tick, 500);
    return () => clearTimeout(t);
  }, []);

  // Floating code particles
  const particles = React.useMemo(() => {
    const snippets = ['const','import','async','await','return','export','function','=>','{','}','[]','...','let','data','sync','null','true','0x','ssh','api','GET','POST','fetch','pipe','build','node','init','push','pull'];
    return Array.from({ length: 20 }, (_, i) => ({
      text: snippets[i % snippets.length],
      left: Math.random() * 100,
      delay: Math.random() * 6,
      duration: 6 + Math.random() * 6,
      size: 9 + Math.random() * 3,
    }));
  }, []);

  return React.createElement('div', { className: `loading-screen ${fadeOut ? 'fade-out' : ''}` },
    // Particles
    React.createElement('div', { className: 'loading-particles' },
      particles.map((p, i) =>
        React.createElement('span', {
          key: i,
          className: 'loading-particle',
          style: { left: p.left+'%', fontSize: p.size+'px', animationDelay: p.delay+'s', animationDuration: p.duration+'s' }
        }, p.text)
      )
    ),
    // Scanline
    React.createElement('div', { className: 'loading-scanline' }),
    // Logo
    React.createElement('div', { className: 'loading-logo' }, 'l i g h t w o r k'),
    // Percent
    React.createElement('div', { className: 'loading-percent' }, `${String(pct).padStart(3,'0')}%`),
    // Bar
    React.createElement('div', { className: 'loading-bar-track' },
      React.createElement('div', { className: 'loading-bar-fill', style: { width: `${pct}%` } })
    ),
    // Status line
    React.createElement('div', {
      style: { marginTop:'14px', fontSize:'10px', fontFamily:'monospace', color:'#3f3f46', letterSpacing:'0.08em', opacity:0, animation:'loadLogoIn 0.4s ease-out 0.5s forwards', transition:'color 0.3s ease' }
    }, `> ${statusLine}...`),
    // Footer
    React.createElement('div', { className: 'loading-line' }, 'studio crm')
  );
}

/* ── localStorage helper ───────────────────────────────────────────────── */
function usePersistedState(key, init) {
  const [state, setState] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : (typeof init === 'function' ? init() : init); }
    catch { return typeof init === 'function' ? init() : init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(state)); } catch {} }, [key, state]);
  return [state, setState];
}

const timeAgo = (iso) => {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff/60000); if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins/60); if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs/24); if (days < 30) return days + 'd ago';
  return Math.floor(days/30) + 'mo ago';
};

/* ── Right-click Context Menu ──────────────────────────────────────────── */
function ContextMenu({ x, y, options, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const k = (e) => { if (e.key === 'Escape') onClose(); };
    setTimeout(() => { document.addEventListener('click', h); document.addEventListener('contextmenu', h); document.addEventListener('keydown', k); }, 0);
    return () => { document.removeEventListener('click', h); document.removeEventListener('contextmenu', h); document.removeEventListener('keydown', k); };
  }, [onClose]);
  // Clamp to viewport
  const style = { position:'fixed', top: Math.min(y, window.innerHeight - 160), left: Math.min(x, window.innerWidth - 180), zIndex:200, background:'var(--dropdown-bg)', backdropFilter:'blur(16px)', WebkitBackdropFilter:'blur(16px)', border:'1px solid var(--border-light)', borderRadius:'var(--radius)', padding:'4px', minWidth:'160px', boxShadow:'0 12px 40px rgba(0,0,0,0.25), 0 0 20px rgba(var(--glow-rgb),0.06)' };
  return (
    <div ref={ref} className="dropdown-enter" style={style}>
      {options.map((opt, i) => opt.divider ? (
        <div key={i} style={{ height:'1px', background:'var(--border)', margin:'4px 0' }} />
      ) : (
        <button key={i} onClick={() => { opt.action(); onClose(); }}

          onMouseEnter={e => e.currentTarget.style.background='var(--surface-hover)'}

          {opt.label}
        </button>
      ))}
    </div>
  );
}

function ProfileSwitcher({ active, onSwitch, counts }) {
  const [open, setOpen] = useState(false);

  const ref = useRef(null);
  const p = PROFILES.find(x => x.id === active);

function QuickLinks({ profileId, allLinks, setAllLinks }) {
  const links = allLinks[profileId] || [];
  const setLinks = (newLinks) => setAllLinks(prev => ({ ...prev, [profileId]: typeof newLinks === 'function' ? newLinks(prev[profileId]||[]) : newLinks }));
  const [adding, setAdding] = useState(false);
  const [editLink, setEditLink] = useState(null);
  const [nn, setNn] = useState('');
  const [nu, setNu] = useState('');
  const ir = useRef(null);
  useEffect(() => { if (adding && ir.current) ir.current.focus(); }, [adding]);
  const add = () => { if (!nn.trim()||!nu.trim()) return; const cs=['#a78bfa','#fbbf24','#34d399','#60a5fa','#fb923c','#f87171']; setLinks(prev => [...prev,{id:'l'+Date.now(),name:nn.trim(),icon:nn.trim()[0].toUpperCase(),color:cs[(prev.length)%cs.length],url:nu.trim().startsWith('http')?nu.trim():'https://'+nu.trim()}]); setNn(''); setNu(''); setAdding(false); };
  const rm = id => setLinks(prev => prev.filter(l=>l.id!==id));
  const updateLink = (updated) => { setLinks(prev => prev.map(l => l.id === updated.id ? updated : l)); setEditLink(null); };
  return (
    <>
    <div style={{ display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap' }}>
      {links.map(l => (
        <a key={l.id} href={l.url} target="_blank" rel="noopener noreferrer"

          style={{ display:'inline-flex',alignItems:'center',gap:'7px',padding:'5px 10px',textDecoration:'none',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'16px',fontSize:'12px',color:'var(--text-secondary)',cursor:'pointer' }}
          onMouseEnter={e=>e.currentTarget.style.borderColor='var(--border-light)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
          <span style={{ width:'16px',height:'16px',borderRadius:'3px',display:'flex',alignItems:'center',justifyContent:'center',background:l.color+'20',color:l.color,fontSize:'9px',fontWeight:700 }}>{l.icon}</span>
          {l.name}
          <span style={{ width:'5px',height:'5px',borderRadius:'50%',background:'var(--green)' }} />
          <span onClick={e=>{e.preventDefault();e.stopPropagation();rm(l.id);}} style={{ fontSize:'11px',color:'var(--text-muted)',cursor:'pointer',marginLeft:'2px',lineHeight:1 }}>&times;</span>
        </a>
      ))}
      {adding ? (
        <div style={{ display:'inline-flex',alignItems:'center',gap:'4px',padding:'4px 8px',background:'var(--surface)',border:'1px solid var(--border-light)',borderRadius:'16px',fontSize:'12px' }}>
          <input ref={ir} value={nn} onChange={e=>setNn(e.target.value)} placeholder="Name" style={{ width:'60px',fontSize:'12px' }} />
          <input value={nu} onChange={e=>setNu(e.target.value)} placeholder="URL" style={{ width:'100px',fontSize:'12px' }} onKeyDown={e=>{if(e.key==='Enter')add();if(e.key==='Escape')setAdding(false);}} />
          <button onClick={add} style={{ background:'transparent',border:'none',color:'var(--green)',cursor:'pointer',fontSize:'14px',lineHeight:1,padding:'0 2px' }}>&check;</button>
          <button onClick={()=>setAdding(false)} style={{ background:'transparent',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'12px',lineHeight:1,padding:'0 2px' }}>&times;</button>
        </div>
      ) : (
        <button onClick={()=>setAdding(true)} style={{ padding:'5px 10px',background:'transparent',border:'1px dashed var(--border-light)',borderRadius:'16px',cursor:'pointer',color:'var(--text-muted)',fontSize:'12px' }}>+ Add</button>

    </div>

  );
}

/* ── Card Detail Modal ─────────────────────────────────────────────────── */
function CardDetail({ card, onClose, onUpdate, onArchive, color }) {
  const isDeal = card.value !== undefined;
  const [title, setTitle] = useState(card.title || '');
  const [value, setValue] = useState(card.value != null ? String(card.value) : '');
  const [assignee, setAssignee] = useState(card.assignee || '');
  const [type, setType] = useState(card.type || '');
  const [stage, setStage] = useState(card.stage || '');
  const [platforms, setPlatforms] = useState((card.platforms || []).join(', '));
  const [notes, setNotes] = useState(card.notes || '');
  const [images, setImages] = useState(card.images || []);
  const [dueDate, setDueDate] = useState(card.dueDate || '');
  const fileRef = useRef(null);

  const handleImageAdd = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(f => {
      const reader = new FileReader();
      reader.onload = (ev) => setImages(prev => [...prev, ev.target.result]);
      reader.readAsDataURL(f);
    });
  };

  const save = () => {
    const updated = { ...card, title, notes, images, dueDate, stage };
    if (isDeal) { updated.value = parseInt(value) || 0; updated.assignee = assignee; }
    else { updated.type = type; updated.platforms = platforms.split(',').map(s=>s.trim()).filter(Boolean); }
    onUpdate(updated); onClose();
  };
  const removeImage = (i) => setImages(prev => prev.filter((_, idx) => idx !== i));

  const labelStyle = { fontSize:'11px',fontWeight:600,color:'var(--text-muted)',letterSpacing:'0.04em',textTransform:'uppercase',marginBottom:'8px' };
  const fieldStyle = { width:'100%',padding:'9px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',fontSize:'13px',color:'var(--text)' };
  const stageOptions = isDeal ? DEAL_STAGES : CONTENT_STAGES;
  const stageLabels = isDeal ? DEAL_LABELS : CONTENT_LABELS;

  return (
    <div style={{ position:'fixed',inset:0,zIndex:100,display:'flex',justifyContent:'center',alignItems:'center' }}>
      <div onClick={save} style={{ position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',backdropFilter:'blur(6px)' }} />
      <div className="modal-enter" style={{ position:'relative',zIndex:1,background:'var(--modal-bg)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',border:'1px solid var(--border)',borderRadius:'12px',width:'580px',maxHeight:'85vh',overflow:'auto',padding:'28px' }}>
        <button onClick={save} style={{ position:'absolute',top:'14px',right:'14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'6px',width:'26px',height:'26px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-secondary)',cursor:'pointer',fontSize:'13px' }}>&times;</button>

        {/* Color bar */}
        <div style={{ width:'40px',height:'4px',borderRadius:'2px',background:color,marginBottom:'16px' }} />

        {/* Editable Title */}
        <input value={title} onChange={e => setTitle(e.target.value)}
          style={{ ...fieldStyle, fontSize:'20px',fontWeight:700,letterSpacing:'-0.02em',padding:'6px 0',border:'none',background:'transparent',marginBottom:'16px',width:'90%' }}
          placeholder="Untitled" />

        {/* Editable fields grid */}
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'20px',paddingBottom:'20px',borderBottom:'1px solid var(--border)' }}>
          {/* Stage */}
          <div>
            <div style={labelStyle}>Stage</div>
            <div style={{ display:'flex',gap:'4px',flexWrap:'wrap' }}>
              {stageOptions.map(s => (
                <button key={s} onClick={() => setStage(s)} style={{
                  padding:'4px 10px',fontSize:'11px',fontWeight:500,
                  background:stage===s?color+'20':'transparent',
                  border:stage===s?`1px solid ${color}40`:'1px solid var(--border)',
                  borderRadius:'14px',cursor:'pointer',
                  color:stage===s?'var(--text)':'var(--text-muted)',
                  transition:'all 0.15s',textTransform:'uppercase',letterSpacing:'0.03em',
                }}>{stageLabels[s]}</button>
              ))}
            </div>
          </div>

          {/* Deal: Value + Assignee / Content: Type */}
          {isDeal ? (
            <>
              <div>
                <div style={labelStyle}>Value</div>
                <div style={{ display:'flex',alignItems:'center',gap:'4px' }}>
                  <span style={{ color:'var(--text-muted)',fontSize:'14px' }}>$</span>
                  <input value={value} onChange={e => setValue(e.target.value.replace(/\D/g,''))}
                    placeholder="0" style={{ ...fieldStyle, width:'100%' }} />
                </div>
              </div>
              <div>
                <div style={labelStyle}>Assignee</div>
                <input value={assignee} onChange={e => setAssignee(e.target.value)}
                  placeholder="Name" style={fieldStyle} />
              </div>
            </>
          ) : (
            <>
              <div>
                <div style={labelStyle}>Type</div>
                <div style={{ display:'flex',gap:'4px',flexWrap:'wrap' }}>
                  {['Long-form','Carousel','Short-form','Thread'].map(t => {
                    const tc = TYPE_COLORS[t]||'#777';
                    return (
                      <button key={t} onClick={() => setType(t)} style={{
                        padding:'4px 10px',fontSize:'11px',fontWeight:500,
                        background:type===t?tc+'20':'transparent',
                        border:type===t?`1px solid ${tc}40`:'1px solid var(--border)',
                        borderRadius:'14px',cursor:'pointer',
                        color:type===t?'var(--text)':'var(--text-muted)',transition:'all 0.15s',
                      }}>{t}</button>
                    );
                  })}
                </div>
              </div>
              <div>
                <div style={labelStyle}>Platforms</div>

          <div style={labelStyle}>Due Date</div>
          <div style={{ display:'flex',alignItems:'center',gap:'10px' }}>

            {dueDate && <span style={{ fontSize:'11px',color:'var(--green)' }}>Shows on calendar</span>}
          </div>
        </div>

        {/* Notes */}
        <div style={{ marginBottom:'20px' }}>
          <div style={labelStyle}>Notes</div>
          <textarea
            value={notes} onChange={e => setNotes(e.target.value)}
            placeholder="Add notes, context, next steps..."
            rows={4}
            style={{ width:'100%',padding:'12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:'13px',lineHeight:'1.6',color:'var(--text-secondary)' }}
          />
        </div>

        {/* Images */}
        <div>
          <div style={labelStyle}>Attachments</div>
          <div style={{ display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'12px' }}>
            {images.map((img, i) => (
              <div key={i} style={{ position:'relative',width:'100px',height:'80px',borderRadius:'var(--radius-sm)',overflow:'hidden',border:'1px solid var(--border)' }}>
                <img src={img} style={{ width:'100%',height:'100%',objectFit:'cover' }} />
                <button onClick={() => removeImage(i)} style={{ position:'absolute',top:'4px',right:'4px',width:'18px',height:'18px',borderRadius:'50%',background:'rgba(0,0,0,0.7)',border:'none',color:'#fff',fontSize:'10px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>&times;</button>
              </div>
            ))}
            <button onClick={() => fileRef.current?.click()} style={{
              width:'100px',height:'80px',borderRadius:'var(--radius-sm)',
              border:'1px dashed var(--border-light)',background:'transparent',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'4px',
              cursor:'pointer',color:'var(--text-muted)',fontSize:'11px',
            }}>
              <span style={{ fontSize:'18px',lineHeight:1 }}>+</span>
              Add image
            </button>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{ display:'none' }} onChange={handleImageAdd} />

        </div>

        {/* Actions */}
        <div style={{ display:'flex',gap:'8px',paddingTop:'16px',borderTop:'1px solid var(--border)',alignItems:'center' }}>
          <button onClick={save} style={{ padding:'8px 20px',background:color,border:'none',borderRadius:'var(--radius-sm)',color:'#fff',fontSize:'13px',fontWeight:600,cursor:'pointer' }}>Save</button>
          <button onClick={onClose} style={{ padding:'8px 16px',background:'transparent',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-secondary)',fontSize:'13px',cursor:'pointer' }}>Cancel</button>
          {onArchive && <button onClick={() => { onArchive(card); onClose(); }} style={{ marginLeft:'auto',padding:'8px 16px',background:'transparent',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-muted)',fontSize:'12px',cursor:'pointer',transition:'color 0.15s,border-color 0.15s' }}
            onMouseEnter={e=>{e.currentTarget.style.color='var(--red)';e.currentTarget.style.borderColor='var(--red)';}}
            onMouseLeave={e=>{e.currentTarget.style.color='var(--text-muted)';e.currentTarget.style.borderColor='var(--border)';}}
          >Archive</button>}
        </div>
      </div>
    </div>
  );

/* ── Draggable Card ────────────────────────────────────────────────────── */
function DealCard({ deal, profileId, onOpen, onArchive, onDelete }) {
  const color = PROFILE_COLORS[profileId] || '#777';
  const label = PROFILES.find(p => p.id === profileId)?.label || '';
  const [ctx, setCtx] = useState(null);
  const [confirmDel, setConfirmDel] = useState(false);
  const [hoverX, setHoverX] = useState(false);
  const handleContext = (e) => { e.preventDefault(); e.stopPropagation(); setCtx({ x: e.clientX, y: e.clientY }); };
  return (
    <>
    <div draggable onDragStart={e => { dragData = { id: deal.id, type: 'deal' }; e.currentTarget.classList.add('card-dragging'); }}
      onDragEnd={e => { e.currentTarget.classList.remove('card-dragging'); dragData = null; }}
      onClick={() => onOpen(deal)} onContextMenu={handleContext}
      style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'14px',cursor:'grab',transition:'border-color 0.15s',position:'relative' }}
      onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border-light)';setHoverX(true);}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';setHoverX(false);}}>
      {hoverX && <button onClick={e=>{e.stopPropagation();setConfirmDel(true);}} style={{ position:'absolute',top:'6px',right:'6px',width:'20px',height:'20px',borderRadius:'4px',background:'transparent',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'14px',lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center',transition:'color 0.15s' }}
        onMouseEnter={e=>e.currentTarget.style.color='var(--red)'} onMouseLeave={e=>e.currentTarget.style.color='var(--text-muted)'}>&times;</button>}
      <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px' }}>
        <div style={{ display:'flex',alignItems:'center',gap:'6px' }}>
          <span style={{ width:'7px',height:'7px',borderRadius:'50%',background:color }} />
          <span style={{ fontSize:'11px',color:'var(--text-secondary)' }}>{label}</span>
        </div>
        <span style={{ fontSize:'13px',fontWeight:600,color:'var(--green)' }}>{fmtFull(deal.value)}</span>
      </div>
      <div style={{ fontSize:'13.5px',fontWeight:600,lineHeight:1.4,marginBottom:'6px',letterSpacing:'-0.01em' }}>{deal.title}</div>
      <div style={{ fontSize:'11.5px',color:'var(--text-muted)' }}>{deal.assignee}</div>
    </div>
    {ctx && <ContextMenu x={ctx.x} y={ctx.y} onClose={() => setCtx(null)} options={[
      { icon:'↗', label:'Open', action:() => onOpen(deal) },
      { divider: true },
      { icon:'📦', label:'Archive', action:() => onArchive(deal) },
      { icon:'🗑', label:'Delete', action:() => setConfirmDel(true), danger:true },
    ]} />}
    {confirmDel && <ConfirmDialog message={`Delete "${deal.title}"? This cannot be undone.`} onConfirm={() => { onDelete(deal.id); setConfirmDel(false); }} onCancel={() => setConfirmDel(false)} />}
    </>
  );
}

function DropColumn({ stageKey, label, count, totalValue, children, onDrop }) {
  const [over, setOver] = useState(false);
  const empty = !children || (Array.isArray(children) && children.length === 0);
  return (
    <div
      onDragOver={e => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={e => { e.preventDefault(); setOver(false); if (dragData) onDrop(dragData.id, stageKey); }}
      className={over ? 'drop-target' : ''}
      style={{ flex:'1 1 0',minWidth:'200px',padding:'4px',transition:'background 0.15s' }}
    >
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px',padding:'0 2px' }}>

          <span style={{ fontSize:'11px',fontWeight:600,letterSpacing:'0.05em',color:'var(--text-secondary)' }}>{label}</span>
          <span style={{ fontSize:'11px',color:'var(--text-muted)' }}>{count}</span>
        </div>
        {totalValue != null && totalValue > 0 && <span style={{ fontSize:'11px',fontWeight:500,color:'var(--text-muted)' }}>{fmtShort(totalValue)}</span>}
      </div>
      <div style={{ display:'flex',flexDirection:'column',gap:'6px',minHeight:'100px' }}>

    </div>
  );
}

/* ── Animated Number ────────────────────────────────────────────────────── */
function AnimatedValue({ value, prefix='$' }) {
  const [display, setDisplay] = useState(value);
  const prevRef = useRef(value);
  const chars = '0123456789';
  const intervalRef = useRef(null);

  useEffect(() => {
    if (prevRef.current === value) return;
    const target = value.toLocaleString();
    let iteration = 0;
    clearInterval(intervalRef.current);
    intervalRef.current = setInterval(() => {
      setDisplay(prev => {
        const result = target.split('').map((ch, i) => {
          if (ch === ',' || ch === '.') return ch;
          if (i < iteration) return target[i];
          return chars[Math.floor(Math.random() * chars.length)];
        }).join('');
        return result;
      });
      iteration += 0.5;
      if (iteration >= target.length) {
        clearInterval(intervalRef.current);
        setDisplay(target);
      }
    }, 25);
    prevRef.current = value;
    return () => clearInterval(intervalRef.current);
  }, [value]);

  useEffect(() => { setDisplay(value.toLocaleString()); }, []);

  return <span>{prefix}{typeof display === 'number' ? display.toLocaleString() : display}</span>;
}

function IdeaCard({ idea, onDelete, onStar, onConvert, onUpdate }) {
  const [hoverX, setHoverX] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const [ctx, setCtx] = useState(null);
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(idea.text);
  const [editSource, setEditSource] = useState(idea.source || '');
  const textRef = useRef(null);
  useEffect(() => { if (editing && textRef.current) textRef.current.focus(); }, [editing]);
  const saveEdit = () => {
    if (editText.trim()) onUpdate({ ...idea, text: editText.trim(), source: editSource.trim() || null });
    setEditing(false);
  };
  return (
    <>
    <div onContextMenu={e=>{e.preventDefault();setCtx({x:e.clientX,y:e.clientY});}}
      onMouseEnter={()=>setHoverX(true)} onMouseLeave={()=>setHoverX(false)}
      onClick={()=>{ if(!editing) setEditing(true); }}
      style={{ background:'var(--surface)',border:'1px solid '+(editing?'var(--border-light)':'var(--border)'),borderRadius:'var(--radius)',padding:'16px',transition:'border-color 0.15s',position:'relative',cursor:editing?'default':'pointer' }}
      onMouseOver={e=>{if(!editing)e.currentTarget.style.borderColor='var(--border-light)';}} onMouseOut={e=>{if(!editing)e.currentTarget.style.borderColor='var(--border)';}}>
      {/* Star + Delete */}
      <div style={{ position:'absolute',top:'10px',right:'10px',display:'flex',gap:'4px',alignItems:'center' }}>
        <button onClick={e=>{e.stopPropagation();onStar(idea.id);}} style={{ background:'transparent',border:'none',cursor:'pointer',fontSize:'14px',color:idea.starred?'var(--yellow)':'var(--text-muted)',opacity:idea.starred?1:(hoverX?0.6:0),transition:'opacity 0.15s, color 0.15s',padding:'2px' }}>{idea.starred?'★':'☆'}</button>
        {hoverX && <button onClick={e=>{e.stopPropagation();setConfirmDel(true);}} style={{ background:'transparent',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'14px',lineHeight:1,transition:'color 0.15s',padding:'2px' }}
          onMouseEnter={e=>e.currentTarget.style.color='var(--red)'} onMouseLeave={e=>e.currentTarget.style.color='var(--text-muted)'}>&times;</button>}
      </div>
      {/* Body */}
      {editing ? (
        <div onClick={e=>e.stopPropagation()}>
          <textarea ref={textRef} value={editText} onChange={e=>setEditText(e.target.value)}
            rows={3} style={{ width:'100%',fontSize:'13.5px',fontWeight:500,lineHeight:1.55,marginBottom:'10px',padding:'4px 0',paddingRight:'50px' }}
            onKeyDown={e=>{ if(e.key==='Enter'&&e.metaKey) saveEdit(); if(e.key==='Escape'){setEditing(false);setEditText(idea.text);setEditSource(idea.source||'');}}} />
          <div style={{ display:'flex',gap:'8px',alignItems:'center',marginBottom:'10px' }}>
            <input value={editSource} onChange={e=>setEditSource(e.target.value)} placeholder="Source (optional)"
              style={{ fontSize:'12px',padding:'5px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',width:'160px' }} />
          </div>
          <div style={{ display:'flex',gap:'6px',justifyContent:'flex-end' }}>
            <button onClick={()=>{setEditing(false);setEditText(idea.text);setEditSource(idea.source||'');}} style={{ padding:'5px 12px',background:'transparent',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-secondary)',cursor:'pointer',fontSize:'11px' }}>Cancel</button>
            <button onClick={saveEdit} style={{ padding:'5px 12px',background:'var(--green)',border:'none',borderRadius:'var(--radius-sm)',color:'#fff',cursor:'pointer',fontSize:'11px',fontWeight:600 }}>Save · ⌘↵</button>
          </div>
        </div>
      ) : (
        <>
          <div style={{ fontSize:'13.5px',fontWeight:500,lineHeight:1.55,marginBottom:'8px',paddingRight:'50px',color:'var(--text)' }}>{idea.text}</div>
          {/* Meta */}
          <div style={{ display:'flex',gap:'10px',alignItems:'center',fontSize:'11px',color:'var(--text-muted)' }}>
            {idea.source && <span style={{ padding:'2px 7px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'4px' }}>{idea.source}</span>}
            <span>{timeAgo(idea.createdAt)}</span>
          </div>
        </>
      )}
    </div>
    {ctx && <ContextMenu x={ctx.x} y={ctx.y} onClose={()=>setCtx(null)} options={[
      { icon:'✎', label:'Edit', action:()=>setEditing(true) },
      { icon:'★', label:idea.starred?'Unstar':'Star', action:()=>onStar(idea.id) },
      { icon:'↗', label:'Convert to Content', action:()=>onConvert(idea) },
      { divider:true },
      { icon:'🗑', label:'Delete', action:()=>setConfirmDel(true), danger:true },
    ]} />}
    {confirmDel && <ConfirmDialog message={`Delete this idea? This cannot be undone.`} onConfirm={()=>{onDelete(idea.id);setConfirmDel(false);}} onCancel={()=>setConfirmDel(false)} />}
    </>
  );
}

function IdeasView({ ideas, setIdeas, activeProfile, setActiveProfile, content, setContent }) {
  const [search, setSearch] = useState('');
  const [adding, setAdding] = useState(false);
  const [newText, setNewText] = useState('');
  const [newTags, setNewTags] = useState('');
  const [newSource, setNewSource] = useState('');
  const [convertIdea, setConvertIdea] = useState(null);
  const inputRef = useRef(null);
  useEffect(() => { if (adding && inputRef.current) inputRef.current.focus(); }, [adding]);

  const profileIdeas = ideas[activeProfile] || [];
  const profileCounts = {};
  PROFILES.forEach(p => { profileCounts[p.id] = (ideas[p.id]||[]).length; });

  // Filter
  const filtered = profileIdeas.filter(i => {
    return (i.text + i.tags.join(' ') + (i.source||'')).toLowerCase().includes(search.toLowerCase());
  }).sort((a, b) => {
    if (a.starred && !b.starred) return -1;
    if (!a.starred && b.starred) return 1;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  const addIdea = () => {
    if (!newText.trim()) return;
    const idea = {
      id: 'i' + Date.now(),
      text: newText.trim(),
      tags: newTags.split(',').map(s=>s.trim().toLowerCase().replace(/^#/,'')).filter(Boolean),
      source: newSource.trim() || null,
      createdAt: new Date().toISOString(),
      starred: false,
    };
    setIdeas(prev => ({ ...prev, [activeProfile]: [idea, ...(prev[activeProfile]||[])] }));
    setNewText(''); setNewTags(''); setNewSource(''); setAdding(false);
  };
  const removeIdea = (id) => setIdeas(prev => ({ ...prev, [activeProfile]: (prev[activeProfile]||[]).filter(i=>i.id!==id) }));
  const toggleStar = (id) => setIdeas(prev => ({ ...prev, [activeProfile]: (prev[activeProfile]||[]).map(i=>i.id===id?{...i,starred:!i.starred}:i) }));
  const updateIdea = (updated) => setIdeas(prev => ({ ...prev, [activeProfile]: (prev[activeProfile]||[]).map(i=>i.id===updated.id?updated:i) }));
  const handleConvert = ({ title, type, platforms, notes }) => {
    const newItem = { id:'c'+Date.now(), title, type, stage:'source', platforms, age:null, notes, images:[], dueDate:'' };
    setContent(prev => ({ ...prev, [activeProfile]: [...(prev[activeProfile]||[]), newItem] }));
    removeIdea(convertIdea.id);
    setConvertIdea(null);
  };

  return (
    <div style={{ flex:1,overflow:'auto',padding:'28px 32px' }}>
      <div style={{ marginBottom:'20px' }}>
        <div style={{ display:'flex',alignItems:'center',gap:'12px',marginBottom:'16px' }}>
          <h1 style={{ fontSize:'15px',fontWeight:600 }}>Ideas</h1>
          <ProfileSwitcher active={activeProfile} onSwitch={setActiveProfile} counts={profileCounts} />
          <div style={{ marginLeft:'auto',display:'flex',gap:'8px',alignItems:'center' }}>
            <div style={{ display:'flex',alignItems:'center',gap:'7px',padding:'7px 12px',background:'var(--surface)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',width:'180px' }}>
              <span style={{ color:'var(--text-muted)',fontSize:'12px' }}>&#x2315;</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ideas..." style={{ fontSize:'12px',width:'100%' }} />
            </div>
            <button onClick={()=>setAdding(true)} style={{ padding:'7px 16px',background:'transparent',border:'1px solid var(--border-light)',borderRadius:'var(--radius-sm)',color:'var(--text)',fontSize:'13px',fontWeight:500,cursor:'pointer' }}>+ New</button>
          </div>
        </div>
      </div>

      {/* Quick capture */}
      {adding && (
        <div className="content-fade" style={{ background:'var(--surface)',border:'1px solid var(--border-light)',borderRadius:'var(--radius)',padding:'16px',marginBottom:'12px' }}>
          <textarea ref={inputRef} value={newText} onChange={e=>setNewText(e.target.value)} placeholder="What's the idea? Paste a comment, jot a thought..." rows={3}
            style={{ width:'100%',fontSize:'13px',lineHeight:1.6,marginBottom:'10px',padding:'8px 0' }}
            onKeyDown={e=>{ if(e.key==='Enter'&&e.metaKey) addIdea(); if(e.key==='Escape'){setAdding(false);setNewText('');setNewTags('');setNewSource('');}}} />

/* ── Calendar View ─────────────────────────────────────────────────────── */
function CalendarView({ deals, content }) {
  const today = new Date();
  const year = today.getFullYear(); const month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthName = today.toLocaleString('default', { month: 'long', year: 'numeric' });

  // Build events from deals + content that have dueDate set
  const events = {};
  const addEvent = (day, title, color) => {
    if (!events[day]) events[day] = [];
    events[day].push({ title, color });
  };
  // Pull from all profiles
  Object.entries(deals).forEach(([pid, ds]) => {
    const c = PROFILE_COLORS[pid] || '#777';
    ds.forEach(d => { if (d.dueDate) { const dd = new Date(d.dueDate); if (dd.getMonth() === month && dd.getFullYear() === year) addEvent(dd.getDate(), d.title.split('//')[0].trim(), c); }});
  });
  Object.entries(content).forEach(([pid, cs]) => {
    const c = PROFILE_COLORS[pid] || '#777';
    cs.forEach(item => { if (item.dueDate) { const dd = new Date(item.dueDate); if (dd.getMonth() === month && dd.getFullYear() === year) addEvent(dd.getDate(), item.title, c); }});
  });
  // Add some static fallback events if calendar is empty
  const hasEvents = Object.keys(events).length > 0;
  if (!hasEvents) {
    addEvent(3, 'Nike sync', 'var(--cyan)');
    addEvent(7, 'Podcast recording', 'var(--purple)');
    addEvent(12, 'Culture mixer NYC', 'var(--cyan)');
    addEvent(15, 'Spotify review', 'var(--green)');
    addEvent(18, 'SXSW prep', 'var(--purple)');
    addEvent(22, 'Adidas deliverables', 'var(--green)');
    addEvent(24, 'Team standup', 'var(--orange)');
    addEvent(28, 'Month-end review', 'var(--blue)');
  }

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div style={{ flex:1,overflow:'auto',padding:'28px 32px' }}>
      <h1 style={{ fontSize:'15px',fontWeight:600,marginBottom:'24px' }}>{monthName}</h1>
      <div style={{ display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'1px',background:'var(--border)',borderRadius:'var(--radius)',overflow:'hidden' }}>
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
          <div key={d} style={{ padding:'8px',fontSize:'10px',fontWeight:600,letterSpacing:'0.04em',color:'var(--text-muted)',textTransform:'uppercase',background:'var(--surface)',textAlign:'center' }}>{d}</div>
        ))}
        {cells.map((day, i) => {
          const isToday = day === today.getDate();
          const dayEvents = events[day] || [];
          return (
            <div key={i} style={{ minHeight:'80px',padding:'6px 8px',background:'var(--bg)',position:'relative' }}>
              {day && <>
                <span style={{ fontSize:'12px',fontWeight:isToday?700:400,color:isToday?'var(--green)':'var(--text-secondary)',display:'inline-flex',alignItems:'center',justifyContent:'center',width:isToday?'22px':'auto',height:isToday?'22px':'auto',borderRadius:'50%',background:isToday?'var(--green)'+'20':'transparent' }}>{day}</span>
                {dayEvents.map((ev,j) => (
                  <div key={j} style={{ fontSize:'10px',fontWeight:500,padding:'2px 5px',marginTop:'3px',borderRadius:'3px',background:ev.color+'15',color:ev.color,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis' }}>{ev.title}</div>
                ))}
              </>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── Scramble Logo ──────────────────────────────────────────────────────── */
function ScrambleLogo() {
  const words = ['s t u d i o', 'i p    l a b', 'l i g h t w o r k'];
  const chars = 'abcdefghijklmnopqrstuvwxyz!@#$%^&*()_+{}|:<>?0123456789';
  const [display, setDisplay] = useState(words[0]);
  const [hovering, setHovering] = useState(false);
  const targetRef = useRef(0);
  const intervalRef = useRef(null);

  const scrambleTo = (targetIdx) => {
    const target = words[targetIdx];
    let iteration = 0;
    clearInterval(intervalRef.current);
    intervalRef.current = setInterval(() => {
      setDisplay(target.split('').map((ch, i) => {
        if (ch === ' ') return ' ';
        if (i < iteration) return target[i];
        return chars[Math.floor(Math.random() * chars.length)];
      }).join(''));
      iteration += 1/2;
      if (iteration >= target.length) {
        clearInterval(intervalRef.current);
        setDisplay(target);
      }
    }, 30);
  };

  const handleEnter = () => {
    setHovering(true);
    targetRef.current = (targetRef.current + 1) % words.length;
    scrambleTo(targetRef.current);
  };
  const handleLeave = () => {
    setHovering(false);
  };

  useEffect(() => { return () => clearInterval(intervalRef.current); }, []);

  return (
    <div onMouseEnter={handleEnter} onMouseLeave={handleLeave}
      style={{ fontSize:'11px',fontWeight:500,letterSpacing:'0.16em',color:'var(--text-secondary)',cursor:'default',fontFamily:'monospace',transition:'color 0.2s',userSelect:'none' }}>
      {display}
    </div>
  );
}

function SidebarViewItem({ view, isActive, isChild, isExpanded, hasChildren, onToggle, onClick, onRename, onDragStart, onDragOver, onDrop, onDragEnd, dragOverId, onNestUnder, onUnnest, allTopLevel }) {
  const [editing, setEditing] = useState(false);
  const [editLabel, setEditLabel] = useState(view.label);
  const [ctx, setCtx] = useState(null);
  const inputRef = useRef(null);
  useEffect(() => { if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, [editing]);
  const saveRename = () => { if (editLabel.trim() && editLabel.trim() !== view.label) onRename(view.id, editLabel.trim()); setEditing(false); };

  // Build context menu options
  const ctxOptions = [
    { icon:'✎', label:'Rename', action:() => { setEditing(true); setEditLabel(view.label); } },
  ];
  if (isChild) {
    ctxOptions.push({ icon:'↑', label:'Move to top level', action:() => onUnnest(view.id) });
  }
  // Offer nesting under other top-level views
  const nestTargets = (allTopLevel||[]).filter(t => t.id !== view.id && t.id !== view.parent);
  if (nestTargets.length > 0 && !isChild) {
    nestTargets.forEach(t => {
      ctxOptions.push({ icon:'↳', label:`Nest under ${t.label}`, action:() => onNestUnder(view.id, t.id) });
    });
  }

  return (
    <>
    <div
      draggable={!editing}
      onDragStart={e => { e.dataTransfer.setData('text/plain', view.id); onDragStart(view.id); }}
      onDragOver={e => { e.preventDefault(); onDragOver(view.id); }}
      onDrop={e => { e.preventDefault(); onDrop(view.id); }}
      onDragEnd={onDragEnd}
      onClick={() => { if (!editing) onClick(view.id); }}
      onDoubleClick={e => { e.stopPropagation(); setEditing(true); setEditLabel(view.label); }}
      onContextMenu={e => { e.preventDefault(); e.stopPropagation(); setCtx({ x: e.clientX, y: e.clientY }); }}
      style={{
        display:'flex', alignItems:'center', gap:'4px',
        padding: isChild ? '5px 10px 5px 28px' : '7px 10px',
        width:'100%', background: isActive ? 'var(--surface-hover)' : (dragOverId === view.id ? 'var(--surface)' : 'transparent'),
        border:'none', borderRadius:'var(--radius-sm)', cursor: editing ? 'text' : 'grab',
        color: isActive ? 'var(--text)' : 'var(--text-secondary)',
        fontSize: isChild ? '12px' : '13px', fontWeight: isActive ? 500 : 400, textAlign:'left',
        transition:'background 0.1s, border-color 0.1s',
        borderLeft: dragOverId === view.id ? '2px solid var(--green)' : '2px solid transparent',
      }}>
      <span onClick={e => { if(hasChildren){e.stopPropagation(); onToggle(view.id);} }}
        style={{ fontSize:'13px', color: hasChildren ? 'var(--text-secondary)' : 'transparent', cursor: hasChildren ? 'pointer' : 'default', width:'18px', height:'18px', display:'inline-flex', alignItems:'center', justifyContent:'center', textAlign:'center', transition:'transform 0.15s, color 0.15s', transform: isExpanded && hasChildren ? 'rotate(90deg)' : 'rotate(0deg)', flexShrink:0, userSelect:'none', borderRadius:'3px' }}
        onMouseEnter={e => { if(hasChildren) e.currentTarget.style.color='var(--text)'; }}
        onMouseLeave={e => { if(hasChildren) e.currentTarget.style.color='var(--text-secondary)'; }}>
        {hasChildren ? '▸' : '·'}
      </span>
      {editing ? (
        <input ref={inputRef} value={editLabel} onChange={e => setEditLabel(e.target.value)}
          onClick={e => e.stopPropagation()}
          onKeyDown={e => { if (e.key === 'Enter') saveRename(); if (e.key === 'Escape') setEditing(false); }}
          onBlur={saveRename}
          style={{ fontSize: isChild ? '12px' : '13px', width:'100%', padding:'0', background:'transparent', border:'none', color:'var(--text)', outline:'none' }} />
      ) : (
        <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{view.label}</span>
      )}
    </div>
    {ctx && <ContextMenu x={ctx.x} y={ctx.y} onClose={() => setCtx(null)} options={ctxOptions} />}
    </>
  );
}

function Sidebar({ activeView, setActiveView, theme, setTheme, sidebarViews, setSidebarViews }) {
  const [expanded, setExpanded] = usePersistedState('studio-sidebar-expanded', { content: true });
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  const toggleExpand = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  const handleRename = (id, newLabel) => {
    setSidebarViews(prev => prev.map(v => v.id === id ? { ...v, label: newLabel } : v));
  };

  const handleUnnest = (childId) => {
    setSidebarViews(prev => {
      let views = prev.map(v => ({ ...v, children: [...(v.children||[])] }));
      // Remove from parent's children
      views = views.map(v => ({ ...v, children: (v.children||[]).filter(c => c !== childId) }));
      // Make top-level
      views = views.map(v => v.id === childId ? { ...v, parent: undefined } : v);
      return views;
    });
  };

  const handleNestUnder = (childId, parentId) => {
    setSidebarViews(prev => {
      let views = prev.map(v => ({ ...v, children: [...(v.children||[])] }));
      // Remove from any old parent
      views = views.map(v => ({ ...v, children: (v.children||[]).filter(c => c !== childId) }));
      // Add to new parent + set parent field
      views = views.map(v => v.id === parentId ? { ...v, children: [...(v.children||[]), childId] } : v);
      views = views.map(v => v.id === childId ? { ...v, parent: parentId } : v);
      return views;
    });
    setExpanded(prev => ({ ...prev, [parentId]: true }));
  };

  // Drop on "Views" header to unnest
  const handleViewsHeaderDrop = (e) => {
    e.preventDefault();
    if (dragId) handleUnnest(dragId);
    setDragId(null); setDragOverId(null);
  };

  const handleDrop = (targetId) => {
    if (!dragId || dragId === targetId) { setDragId(null); setDragOverId(null); return; }
    const dragView = sidebarViews.find(v => v.id === dragId);
    const targetView = sidebarViews.find(v => v.id === targetId);
    if (!dragView || !targetView) { setDragId(null); setDragOverId(null); return; }

    const dragIsChild = !!dragView.parent;
    const targetIsTopLevel = !targetView.parent;

    if (dragIsChild && targetIsTopLevel) {
      // Child dropped on a top-level item → unnest and place next to target
      handleUnnest(dragId);
    } else if (!dragIsChild && targetIsTopLevel) {
      // Top-level dropped on top-level → reorder
      setSidebarViews(prev => {
        const filtered = prev.filter(v => v.id !== dragId);
        const targetIdx = filtered.findIndex(v => v.id === targetId);
        filtered.splice(targetIdx, 0, dragView);
        return filtered;
      });
    } else if (!dragIsChild && !targetIsTopLevel) {
      // Top-level dropped on a child → nest under that child's parent
      handleNestUnder(dragId, targetView.parent);
    }
    setDragId(null);
    setDragOverId(null);
  };

  // Separate top-level and nested views
  const topLevel = sidebarViews.filter(v => !v.parent);
  const getChildren = (parentId) => sidebarViews.filter(v => v.parent === parentId);

  return (
    <div style={{ width:'210px',minWidth:'210px',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',height:'100vh',background:'var(--bg)',transition:'background 0.3s ease, border-color 0.3s ease' }}>
      <div style={{ padding:'18px 18px 14px',borderBottom:'1px solid var(--border)' }}>
        <ScrambleLogo />
      </div>
      <div style={{ padding:'10px 10px 4px' }}>
        <div style={{ display:'flex',alignItems:'center',gap:'7px',padding:'7px 10px',background:'var(--surface)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)' }}>
          <span style={{ color:'var(--text-muted)',fontSize:'12px' }}>&#x2315;</span>
          <input placeholder="Search..." style={{ fontSize:'12px',width:'100%' }} />
        </div>
      </div>
      <div style={{ padding:'14px 10px 0', flex:1 }}>
        <div onDragOver={e => { e.preventDefault(); setDragOverId('__views_header__'); }}
          onDragLeave={() => { if(dragOverId==='__views_header__') setDragOverId(null); }}
          onDrop={handleViewsHeaderDrop}
          style={{ fontSize:'10px',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',color: dragOverId === '__views_header__' ? 'var(--green)' : 'var(--text-muted)',padding: dragId ? '8px 10px' : '0 10px 6px',transition:'all 0.15s',borderRadius:'6px',background:dragOverId==='__views_header__'?'rgba(16,185,129,0.08)':'transparent',border: dragId ? '1px dashed '+(dragOverId==='__views_header__'?'var(--green)':'var(--border)'):'1px dashed transparent',marginBottom: dragId ? '4px' : '0' }}>
          Views {dragId && <span style={{ fontSize:'9px',fontWeight:400,letterSpacing:'0.02em',opacity:0.7 }}> · drop to unnest</span>}
        </div>
        {topLevel.map(v => {
          const children = getChildren(v.id);
          const hasChildren = children.length > 0;
          const isExp = expanded[v.id] !== false;
          return (
            <div key={v.id}>
              <SidebarViewItem
                view={v} isActive={activeView === v.id} isChild={false}
                isExpanded={isExp} hasChildren={hasChildren}
                onToggle={toggleExpand} onClick={setActiveView} onRename={handleRename}
                onDragStart={setDragId} onDragOver={setDragOverId} onDrop={handleDrop} onDragEnd={() => { setDragId(null); setDragOverId(null); }}
                dragOverId={dragOverId} onNestUnder={handleNestUnder} onUnnest={handleUnnest} allTopLevel={topLevel}
              />
              {hasChildren && isExp && children.map(child => (
                <SidebarViewItem key={child.id}
                  view={child} isActive={activeView === child.id} isChild={true}
                  isExpanded={false} hasChildren={false}
                  onToggle={toggleExpand} onClick={setActiveView} onRename={handleRename}
                  onDragStart={setDragId} onDragOver={setDragOverId} onDrop={handleDrop} onDragEnd={() => { setDragId(null); setDragOverId(null); }}
                  dragOverId={dragOverId} onNestUnder={handleNestUnder} onUnnest={handleUnnest} allTopLevel={topLevel}
                />
              ))}
            </div>
          );
        })}
      </div>
      <div style={{ borderTop:'1px solid var(--border)',padding:'10px' }}>
        {[{id:'contacts',label:'Contacts'},{id:'calendar',label:'Calendar'},{id:'archive',label:'Archive'},{id:'settings',label:'Settings'}].map(v => (
          <button key={v.id} onClick={() => setActiveView(v.id)} style={{
            display:'flex',alignItems:'center',padding:'6px 10px',width:'100%',
            background:activeView===v.id?'var(--surface-hover)':'transparent',
            border:'none',borderRadius:'var(--radius-sm)',cursor:'pointer',
            color:activeView===v.id?'var(--text)':'var(--text-muted)',fontSize:'12px',textAlign:'left',
          }}>{v.label}</button>
        ))}
        <ThemeToggle theme={theme} setTheme={setTheme} />
      </div>
    </div>
  );
}

/* ── App ───────────────────────────────────────────────────────────────── */
function App() {
  const [loading, setLoading] = useState(true);
  const [activeView, setActiveView] = usePersistedState('studio-view', 'deals');
  const [activeProfile, setActiveProfile] = usePersistedState('studio-profile', 'marc-randolph');
  const [deals, setDeals] = usePersistedState('studio-deals', initDeals);
  const [content, setContent] = usePersistedState('studio-content', initContent);
  const [contacts, setContacts] = usePersistedState('studio-contacts', initContacts);
  const [ideas, setIdeas] = usePersistedState('studio-ideas', initIdeas);
  const [archive, setArchive] = usePersistedState('studio-archive', []);
  const [quickLinks, setQuickLinks] = usePersistedState('studio-quicklinks', defaultProfileLinks);
  const [sidebarViews, setSidebarViews] = usePersistedState('studio-sidebar-views', DEFAULT_SIDEBAR_VIEWS);
  const [theme, setTheme] = usePersistedState('studio-theme', 'dark');
  const [openCard, setOpenCard] = useState(null);
  const [openCardType, setOpenCardType] = useState(null);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  if (loading) return <LoadingScreen onDone={() => setLoading(false)} />;

  const handleOpenCard = (card, type) => { setOpenCard(card); setOpenCardType(type); };
  const handleCloseCard = () => { setOpenCard(null); setOpenCardType(null); };
  const handleUpdateCard = (updated) => {
    if (openCardType === 'deal') {
      setDeals(prev => ({ ...prev, [activeProfile]: prev[activeProfile].map(d => d.id === updated.id ? updated : d) }));
    } else {
      setContent(prev => ({ ...prev, [activeProfile]: prev[activeProfile].map(c => c.id === updated.id ? updated : c) }));
    }
    handleCloseCard();
  };
  const handleArchiveCard = (card) => {
    const archiveItem = { ...card, _archiveType: openCardType, _archiveProfile: activeProfile, _archivedAt: new Date().toISOString() };
    setArchive(prev => [archiveItem, ...prev]);
    if (openCardType === 'deal') {
      setDeals(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(d => d.id !== card.id) }));
    } else {
      setContent(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(c => c.id !== card.id) }));
    }
    handleCloseCard();
  };
  // Direct archive from right-click (no modal open)
  const handleDirectArchive = (card, type) => {
    const archiveItem = { ...card, _archiveType: type, _archiveProfile: activeProfile, _archivedAt: new Date().toISOString() };
    setArchive(prev => [archiveItem, ...prev]);
    if (type === 'deal') {
      setDeals(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(d => d.id !== card.id) }));
    } else {
      setContent(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(c => c.id !== card.id) }));
    }
  };

  return (
    <div style={{ display:'flex',height:'100vh',position:'relative',transition:'background 0.3s ease, color 0.3s ease' }}>
      <div className="grid-bg" />
      <Sidebar activeView={activeView} setActiveView={setActiveView} theme={theme} setTheme={setTheme} sidebarViews={sidebarViews} setSidebarViews={setSidebarViews} />
      {activeView === 'deals' && <DealsView activeProfile={activeProfile} setActiveProfile={setActiveProfile} deals={deals} setDeals={setDeals} onOpenCard={handleOpenCard} onArchiveCard={(card, type) => handleDirectArchive(card, type || 'deal')} />}
      {activeView === 'content' && <ContentView activeProfile={activeProfile} setActiveProfile={setActiveProfile} content={content} setContent={setContent} onOpenCard={handleOpenCard} onArchiveCard={(card, type) => handleDirectArchive(card, type || 'content')} quickLinks={quickLinks} setQuickLinks={setQuickLinks} />}
      {activeView === 'ideas' && <IdeasView ideas={ideas} setIdeas={setIdeas} activeProfile={activeProfile} setActiveProfile={setActiveProfile} content={content} setContent={setContent} />}
      {activeView === 'contacts' && <ContactsView contacts={contacts} setContacts={setContacts} activeProfile={activeProfile} setActiveProfile={setActiveProfile} />}
      {activeView === 'calendar' && <CalendarView deals={deals} content={content} />}
      {activeView === 'archive' && <ArchiveView archive={archive} setArchive={setArchive} deals={deals} setDeals={setDeals} content={content} setContent={setContent} />}
      {activeView === 'settings' && <SettingsView theme={theme} setTheme={setTheme} />}
      {openCard && <CardDetail card={openCard} color={PROFILE_COLORS[activeProfile]} onClose={handleCloseCard} onUpdate={handleUpdateCard} onArchive={handleArchiveCard} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
