    {ctx && <ContextMenu x={ctx.x} y={ctx.y} onClose={() => setCtx(null)} options={ctxOptions} />}
    </>
  );
}

function Sidebar({ activeView, setActiveView, theme, setTheme, sidebarViews, setSidebarViews, activeProfile, setActiveProfile, profileCounts }) {
  const [expanded, setExpanded] = usePersistedState('studio-sidebar-expanded', { content: true });
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  const toggleExpand = (id) => setExpanded(prev => ({ ...prev, [id]: !prev[id] }));

  const handleRename = (id, newLabel) => {
    setSidebarViews(prev => prev.map(v => v.id === id ? { ...v, label: newLabel } : v));
  };

  const handleUnnest = (childId) => {
    setSidebarViews(prev => {
      let views = prev.map(v => ({ ...v, children: [...(v.children||[])] }));
      // Remove from parent's children
      views = views.map(v => ({ ...v, children: (v.children||[]).filter(c => c !== childId) }));
      // Make top-level
      views = views.map(v => v.id === childId ? { ...v, parent: undefined } : v);
      return views;
    });
  };

  const handleNestUnder = (childId, parentId) => {
    setSidebarViews(prev => {
      let views = prev.map(v => ({ ...v, children: [...(v.children||[])] }));
      // Remove from any old parent
      views = views.map(v => ({ ...v, children: (v.children||[]).filter(c => c !== childId) }));
      // Add to new parent + set parent field
      views = views.map(v => v.id === parentId ? { ...v, children: [...(v.children||[]), childId] } : v);
      views = views.map(v => v.id === childId ? { ...v, parent: parentId } : v);
      return views;
    });
    setExpanded(prev => ({ ...prev, [parentId]: true }));
  };

  // Drop on "Views" header to unnest
  const handleViewsHeaderDrop = (e) => {
    e.preventDefault();
    if (dragId) handleUnnest(dragId);
    setDragId(null); setDragOverId(null);
  };

  const handleDrop = (targetId, e) => {
    if (!dragId || dragId === targetId) { setDragId(null); setDragOverId(null); return; }
    const dragView = sidebarViews.find(v => v.id === dragId);
    const targetView = sidebarViews.find(v => v.id === targetId);
    if (!dragView || !targetView) { setDragId(null); setDragOverId(null); return; }

    const shiftHeld = e && e.shiftKey;

    if (shiftHeld && !targetView.parent && !dragView.parent) {
      // Shift+drop = nest under target
      handleNestUnder(dragId, targetId);
    } else if (dragView.parent && !targetView.parent) {
      // Nested item dropped on top-level = unnest and place after target
      setSidebarViews(prev => {
        const updated = prev.map(v => v.id === dragId ? { ...v, parent: undefined } : v);
        const without = updated.filter(v => v.id !== dragId);
        const moved = updated.find(v => v.id === dragId);
        const targetIdx = without.findIndex(v => v.id === targetId);
        without.splice(targetIdx + 1, 0, moved);
        return without;
      });
    } else {
      // Default: reorder (move dragged item to target's position)
      setSidebarViews(prev => {
        const without = prev.filter(v => v.id !== dragId);
        const moved = prev.find(v => v.id === dragId);
        const targetIdx = without.findIndex(v => v.id === targetId);
        without.splice(targetIdx, 0, moved);
        return without;
      });
    }
    setDragId(null);
    setDragOverId(null);
  };

  // Separate top-level and nested views
  const topLevel = sidebarViews.filter(v => !v.parent);
  const getChildren = (parentId) => sidebarViews.filter(v => v.parent === parentId);

  return (
    <div style={{ width:'210px',minWidth:'210px',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',height:'100vh',background:'var(--bg)',transition:'background 0.3s ease, border-color 0.3s ease' }}>
      <div style={{ padding:'18px 18px 14px',borderBottom:'1px solid var(--border)' }}>
        <ScrambleLogo />
      </div>
      <div style={{ padding:'10px 12px 4px' }}>
        <ProfileSwitcher active={activeProfile} onSwitch={setActiveProfile} counts={profileCounts || {}} />
      </div>
      <div
        onDragOver={e => { e.preventDefault(); if(!dragOverId || dragOverId === '__views_area__') setDragOverId('__views_area__'); }}
        onDragLeave={e => { if(!e.currentTarget.contains(e.relatedTarget)) setDragOverId(null); }}
        onDrop={e => { e.preventDefault(); if(dragId) handleUnnest(dragId); setDragId(null); setDragOverId(null); }}
        style={{ padding:'14px 10px 0', flex:1, borderRadius:'8px', background: dragOverId === '__views_area__' && dragId && (sidebarViews.find(v=>v.id===dragId)||{}).parent ? 'rgba(16,185,129,0.04)' : 'transparent', transition:'background 0.15s' }}>
        <div style={{ fontSize:'10px',fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase',color: dragOverId === '__views_area__' && dragId && (sidebarViews.find(v=>v.id===dragId)||{}).parent ? 'var(--green)' : 'var(--text-muted)',padding:'0 10px 6px',transition:'color 0.15s' }}>
          Views {dragId && (sidebarViews.find(v=>v.id===dragId)||{}).parent && <span style={{ fontSize:'9px',fontWeight:400,letterSpacing:'0.02em',opacity:0.7 }}> · drop here to unnest</span>}
        </div>
        {topLevel.map(v => {
          const children = getChildren(v.id);
          const hasChildren = children.length > 0;
          const isExp = expanded[v.id] !== false;
          return (
            <div key={v.id}>
              <SidebarViewItem
                view={v} isActive={activeView === v.id} isChild={false}
                isExpanded={isExp} hasChildren={hasChildren}
                onToggle={toggleExpand} onClick={setActiveView} onRename={handleRename}
                onDragStart={setDragId} onDragOver={setDragOverId} onDrop={handleDrop} onDragEnd={() => { setDragId(null); setDragOverId(null); }}
                dragOverId={dragOverId} onNestUnder={handleNestUnder} onUnnest={handleUnnest} allTopLevel={topLevel}
              />
              {hasChildren && isExp && children.map(child => (
                <SidebarViewItem key={child.id}
                  view={child} isActive={activeView === child.id} isChild={true}
                  isExpanded={false} hasChildren={false}
                  onToggle={toggleExpand} onClick={setActiveView} onRename={handleRename}
                  onDragStart={setDragId} onDragOver={setDragOverId} onDrop={handleDrop} onDragEnd={() => { setDragId(null); setDragOverId(null); }}
                  dragOverId={dragOverId} onNestUnder={handleNestUnder} onUnnest={handleUnnest} allTopLevel={topLevel}
                />
              ))}
            </div>
          );
        })}
      </div>
      <div style={{ borderTop:'1px solid var(--border)',padding:'10px' }}>
        {[{id:'contacts',label:'Contacts'},{id:'calendar',label:'Calendar'},{id:'archive',label:'Archive'},{id:'settings',label:'Settings'}].map(v => (
          <button key={v.id} onClick={() => setActiveView(v.id)} style={{
            display:'flex',alignItems:'center',padding:'6px 10px',width:'100%',
            background:activeView===v.id?'var(--surface-hover)':'transparent',
            border:'none',borderRadius:'var(--radius-sm)',cursor:'pointer',
            color:activeView===v.id?'var(--text)':'var(--text-muted)',fontSize:'12px',textAlign:'left',
          }}>{v.label}</button>
        ))}
        <ThemeToggle theme={theme} setTheme={setTheme} />
      </div>
    </div>
  );
}

/* ── Interactive Grid Background ───────────────────────────────────────── */
function InteractiveGrid() {
  const canvasRef = useRef(null);
  const mouseRef = useRef({ x: -1000, y: -1000 });
  const animRef = useRef(null);
  const theme = document.documentElement.getAttribute('data-theme') || 'dark';

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const spacing = 48;
    const crossSize = 4;

    const resize = () => {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);

    const handleMouse = (e) => { mouseRef.current = { x: e.clientX, y: e.clientY }; };
    window.addEventListener('mousemove', handleMouse);

    const draw = () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const mx = mouseRef.current.x;
      const my = mouseRef.current.y;
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      const baseAlpha = isDark ? 0.04 : 0.03;
      const glowRadius = 140;

      ctx.clearRect(0, 0, w, h);

      // Draw grid lines (subtle glow near cursor)
      for (let x = 0; x <= w; x += spacing) {
        const dist = Math.abs(x - mx);
        const glow = dist < glowRadius ? (1 - dist / glowRadius) * 0.08 : 0;
        const alpha = baseAlpha * 0.3 + glow;
        ctx.strokeStyle = isDark ? 'rgba(255,255,255,' + alpha + ')' : 'rgba(0,0,0,' + alpha + ')';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y += spacing) {
        const dist = Math.abs(y - my);
        const glow = dist < glowRadius ? (1 - dist / glowRadius) * 0.08 : 0;
        const alpha = baseAlpha * 0.3 + glow;
        ctx.strokeStyle = isDark ? 'rgba(255,255,255,' + alpha + ')' : 'rgba(0,0,0,' + alpha + ')';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      // Draw crosshair marks at intersections
      for (let x = 0; x <= w; x += spacing) {
        for (let y = 0; y <= h; y += spacing) {
          const dx = x - mx;
          const dy = y - my;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const glow = dist < glowRadius ? (1 - dist / glowRadius) : 0;
          const alpha = baseAlpha + glow * 0.18;
          const size = crossSize + glow * 1.5;

          ctx.strokeStyle = isDark ? 'rgba(255,255,255,' + alpha + ')' : 'rgba(0,0,0,' + alpha + ')';
          ctx.lineWidth = glow > 0.3 ? 0.8 : 0.5;

          ctx.beginPath();
          ctx.moveTo(x - size, y);
          ctx.lineTo(x + size, y);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(x, y - size);
          ctx.lineTo(x, y + size);
          ctx.stroke();
        }
      }

      animRef.current = requestAnimationFrame(draw);
    };

    draw();

    return () => {
      window.removeEventListener('resize', resize);
      window.removeEventListener('mousemove', handleMouse);
      if (animRef.current) cancelAnimationFrame(animRef.current);
    };
  }, []);

  return (
    <div className="grid-bg" style={{ pointerEvents:'none' }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

/* ── App ───────────────────────────────────────────────────────────────── */
function App() {
  const [loading, setLoading] = useState(false);
  const [authed, setAuthed] = useState(false);
  const [checkingSession, setCheckingSession] = useState(true);
  const [user, setUser] = useState(null);

  // Check if already logged in
  useEffect(() => {
    if (!sb) { setAuthed(true); setLoading(true); setCheckingSession(false); return; }
    sb.auth.getUser().then(({ data }) => {
      if (data && data.user) { setUser(data.user); setAuthed(true); setLoading(true); }
      setCheckingSession(false);
    });
  }, []);

  const handleAuth = (u) => { setUser(u); setAuthed(true); setLoading(true); };

  const [activeView, setActiveView] = useSupabaseState('studio-view', 'deals', user);
  const [activeProfile, setActiveProfile] = useSupabaseState('studio-profile', 'marc-randolph', user);
  const [deals, setDeals] = useSupabaseState('studio-deals', initDeals, user);
  const [content, setContent] = useSupabaseState('studio-content', initContent, user);
  const [contacts, setContacts] = useSupabaseState('studio-contacts', initContacts, user);
  const [ideas, setIdeas] = useSupabaseState('studio-ideas', initIdeas, user);
  const [archive, setArchive] = useSupabaseState('studio-archive', [], user);
  const [customLabels, setCustomLabels] = useSupabaseState('studio-custom-labels', { deal: { ...DEAL_LABELS }, content: { ...CONTENT_LABELS } }, user);
  const [quickLinks, setQuickLinks] = useSupabaseState('studio-quicklinks', defaultProfileLinks, user);
  const [sidebarViews, setSidebarViews] = useSupabaseState('studio-sidebar-views', DEFAULT_SIDEBAR_VIEWS, user);
  const [theme, setTheme] = useSupabaseState('studio-theme', 'light', user);
  const [openCard, setOpenCard] = useState(null);
  const [openCardType, setOpenCardType] = useState(null);

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  if (checkingSession) return <div style={{ width:'100vw',height:'100vh',background:'#fff' }} />;
  if (!authed) return <AuthScreen onAuth={handleAuth} />;
  if (loading) return <LoadingScreen onDone={() => setLoading(false)} />;

  const handleOpenCard = (card, type) => { setOpenCard(card); setOpenCardType(type); };
  const handleCloseCard = () => { setOpenCard(null); setOpenCardType(null); };
  const handleUpdateCard = (updated) => {
    if (openCardType === 'deal') {
      setDeals(prev => ({ ...prev, [activeProfile]: prev[activeProfile].map(d => d.id === updated.id ? updated : d) }));
    } else {
      setContent(prev => ({ ...prev, [activeProfile]: prev[activeProfile].map(c => c.id === updated.id ? updated : c) }));
    }
    handleCloseCard();
  };
  const handleArchiveCard = (card) => {
    const archiveItem = { ...card, _archiveType: openCardType, _archiveProfile: activeProfile, _archivedAt: new Date().toISOString() };
    setArchive(prev => [archiveItem, ...prev]);
    if (openCardType === 'deal') {
      setDeals(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(d => d.id !== card.id) }));
    } else {
      setContent(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(c => c.id !== card.id) }));
    }
    handleCloseCard();
  };
  // Direct archive from right-click (no modal open)
  const handleDirectArchive = (card, type) => {
    const archiveItem = { ...card, _archiveType: type, _archiveProfile: activeProfile, _archivedAt: new Date().toISOString() };
    setArchive(prev => [archiveItem, ...prev]);
    if (type === 'deal') {
      setDeals(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(d => d.id !== card.id) }));
    } else {
      setContent(prev => ({ ...prev, [activeProfile]: prev[activeProfile].filter(c => c.id !== card.id) }));
    }
  };

  return (
    <div style={{ display:'flex',height:'100vh',position:'relative',transition:'background 0.3s ease, color 0.3s ease' }}>
      <InteractiveGrid />
      <Sidebar activeView={activeView} setActiveView={setActiveView} theme={theme} setTheme={setTheme} sidebarViews={sidebarViews} setSidebarViews={setSidebarViews} activeProfile={activeProfile} setActiveProfile={setActiveProfile} profileCounts={(() => { const c = {}; PROFILES.forEach(p => { c[p.id] = (deals[p.id]||[]).length + (content[p.id]||[]).length + (ideas[p.id]||[]).length; }); return c; })()} />
      {activeView === 'deals' && <DealsView activeProfile={activeProfile} setActiveProfile={setActiveProfile} deals={deals} setDeals={setDeals} onOpenCard={handleOpenCard} onArchiveCard={(card, type) => handleDirectArchive(card, type || 'deal')} customLabels={customLabels.deal || DEAL_LABELS} onRenameLabel={(stage, name) => setCustomLabels(prev => ({ ...prev, deal: { ...prev.deal, [stage]: name } }))} />}
      {activeView === 'content' && <ContentView activeProfile={activeProfile} setActiveProfile={setActiveProfile} content={content} setContent={setContent} onOpenCard={handleOpenCard} onArchiveCard={(card, type) => handleDirectArchive(card, type || 'content')} quickLinks={quickLinks} setQuickLinks={setQuickLinks} customLabels={customLabels.content || CONTENT_LABELS} onRenameLabel={(stage, name) => setCustomLabels(prev => ({ ...prev, content: { ...prev.content, [stage]: name } }))} />}
      {activeView === 'ideas' && <IdeasView ideas={ideas} setIdeas={setIdeas} activeProfile={activeProfile} setActiveProfile={setActiveProfile} content={content} setContent={setContent} />}
      {activeView === 'contacts' && <ContactsView contacts={contacts} setContacts={setContacts} activeProfile={activeProfile} setActiveProfile={setActiveProfile} />}
      {activeView === 'calendar' && <CalendarView deals={deals} content={content} activeProfile={activeProfile} />}
      {activeView === 'archive' && <ArchiveView archive={archive} setArchive={setArchive} deals={deals} setDeals={setDeals} content={content} setContent={setContent} />}
      {activeView === 'settings' && <SettingsView theme={theme} setTheme={setTheme} onProfilesChange={() => setActiveProfile(p => PROFILES.find(pr=>pr.id===p) ? p : (PROFILES[0]||{}).id || 'culture')} user={user} onLogout={async () => { if (sb) await sb.auth.signOut(); setUser(null); setAuthed(false); }} />}
      {openCard && <CardDetail card={openCard} color={PROFILE_COLORS[activeProfile]} onClose={handleCloseCard} onUpdate={handleUpdateCard} onArchive={handleArchiveCard} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
