<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio CRM</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root, [data-theme="light"] {
      --bg: #f8f8fa; --surface: #ffffff; --surface-hover: #f0f0f3;
      --border: #e4e4e7; --border-light: #d4d4d8;
      --text: #18181b; --text-secondary: #52525b; --text-muted: #a1a1aa;
      --green: #059669; --purple: #7c3aed; --orange: #ea580c;
      --cyan: #0891b2; --blue: #2563eb; --red: #dc2626; --yellow: #ca8a04;
      --radius: 8px; --radius-sm: 6px;
      --modal-bg: rgba(255,255,255,0.92); --dropdown-bg: rgba(255,255,255,0.92);
      --glow-rgb: 5,150,105; --grid-opacity: 0.45;
      --drop-bg: rgba(0,0,0,0.02);
    }
    [data-theme="dark"] {
      --bg: #09090b; --surface: #131316; --surface-hover: #19191d;
      --border: #1c1c22; --border-light: #26262e;
      --text: #f4f4f5; --text-secondary: #a1a1aa; --text-muted: #636370;
      --green: #10b981; --purple: #8b5cf6; --orange: #f97316;
      --cyan: #06b6d4; --blue: #3b82f6; --red: #ef4444; --yellow: #eab308;
      --modal-bg: rgba(19,19,22,0.95); --dropdown-bg: rgba(21,21,24,0.92);
      --glow-rgb: 16,185,129; --grid-opacity: 0.7;
      --drop-bg: rgba(255,255,255,0.02);
    }
    body { font-family: 'DM Sans', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow: hidden; height: 100vh; }
    #root { height: 100vh; }
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
    input, textarea { font-family: inherit; background: transparent; border: none; color: var(--text); outline: none; resize: none; }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    button { font-family: inherit; }
    .grid-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
    .grid-bg canvas { width: 100%; height: 100%; }
    .drop-target { outline: 2px dashed var(--border-light); outline-offset: -2px; border-radius: var(--radius); background: var(--drop-bg); }
    .card-dragging { opacity: 0.4; }

    /* ── Liquid glass glow animations ──────────────────────────── */
    @keyframes glowPulse {
      0% { box-shadow: 0 0 0px rgba(var(--glow-rgb), 0); }
      50% { box-shadow: 0 0 20px rgba(var(--glow-rgb), 0.15), 0 0 40px rgba(var(--glow-rgb), 0.05); }
      100% { box-shadow: 0 0 0px rgba(var(--glow-rgb), 0); }
    }
    @keyframes glowFadeIn {
      0% { opacity: 0; transform: translateY(-4px) scale(0.97); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }
    @keyframes modalGlow {
      0% { opacity: 0; transform: scale(0.96); box-shadow: 0 0 0 rgba(var(--glow-rgb),0); }
      60% { box-shadow: 0 0 30px rgba(var(--glow-rgb),0.12), 0 0 60px rgba(var(--glow-rgb),0.04); }
      100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 rgba(var(--glow-rgb),0); }
    }
    @keyframes contentFade {
      0% { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .glow-pulse { animation: glowPulse 0.6s ease-out; }
    .dropdown-enter { animation: glowFadeIn 0.2s ease-out; }
    .modal-enter { animation: modalGlow 0.35s ease-out; }
    .content-fade { animation: contentFade 0.25s ease-out; }

    /* ── Loading screen ──────────────────────────────────────── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #f8f8fa;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-canvas { position: absolute; inset: 0; }
    .loading-wordmark {
      position: relative; z-index: 2; margin-top: 24px;
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 300;
      letter-spacing: 0.35em; color: rgba(0,0,0,0); text-transform: lowercase;
      transition: color 0.8s ease;
    }
    .loading-wordmark.visible { color: rgba(0,0,0,0.3); }
    .loading-particles-bg {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .loading-code-particle {
      position: absolute;
      font-family: 'DM Sans', monospace; font-size: 10px; color: #d4d4d8;
      animation: codeFloat linear infinite; opacity: 0;
    }
    @keyframes codeFloat {
      0% { transform: translateY(100vh); opacity: 0; }
      8% { opacity: 0.6; }
      92% { opacity: 0.6; }
      100% { transform: translateY(-30px); opacity: 0; }
    }
    @keyframes scanline {
      0% { top: 100%; }
      100% { top: -2%; }
    }
  </style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ── Supabase Client ──────────────────────────────────────────────── */
const SUPABASE_URL = 'https://chdmrjxvqjuowsxssfyt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_2KDDqLBYn1bGVnaDABbCiA_wp8ruJdN';
const sbLib = window.supabase;
const sb = sbLib && sbLib.createClient ? sbLib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ── Supabase-backed persisted state hook ─────────────────────────── */
// Falls back to localStorage if not authenticated or table doesn't exist yet
function useSupabaseState(key, defaultVal, user) {
  const table = 'user_data';
  const [data, setData] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : (typeof defaultVal === 'function' ? defaultVal() : defaultVal); }
    catch { return typeof defaultVal === 'function' ? defaultVal() : defaultVal; }
  });
  const [synced, setSynced] = useState(false);
  const userRef = useRef(user);
  userRef.current = user;

  // Load from Supabase when user available
  useEffect(() => {
    if (!sb || !user || synced) return;
    sb.from(table).select('data').eq('user_id', user.id).eq('key', key).single()
      .then(({ data: row }) => {
        if (row && row.data) { setData(row.data); localStorage.setItem(key, JSON.stringify(row.data)); }
        setSynced(true);
      });
  }, [user, synced, key]);

  // Save to both localStorage and Supabase
  const setAndSync = useCallback((updater) => {
    setData(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      localStorage.setItem(key, JSON.stringify(next));
      if (sb && userRef.current) {
        sb.from(table).upsert({ user_id: userRef.current.id, key, data: next }, { onConflict: 'user_id,key' });
      }
      return next;
    });
  }, [key]);

  return [data, setAndSync];
}

/* ── Auth Screen ─────────────────────────────────────────────────── */
function AuthScreen({ onAuth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');
  const [loading, setLoading] = useState(false);
  const [mounted, setMounted] = useState(false);

  useEffect(() => { requestAnimationFrame(() => setMounted(true)); }, []);

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!email.trim() || (!password.trim() && mode !== 'forgot')) return;
    setError(''); setSuccess(''); setLoading(true);
    try {
      if (!sb) { onAuth(null); return; }
      if (mode === 'login') {
        const { data, error: err } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (err) throw err;
        onAuth(data.user);
      } else if (mode === 'signup') {
        const { data, error: err } = await sb.auth.signUp({ email: email.trim(), password });
        if (err) throw err;
        if (data.user && !data.user.confirmed_at) {
          setSuccess('Check your email for a confirmation link.');
        } else {
          onAuth(data.user);
        }
      } else if (mode === 'forgot') {
        const { error: err } = await sb.auth.resetPasswordForEmail(email.trim());
        if (err) throw err;
        setSuccess('Password reset email sent. Check your inbox.');
      }
    } catch (err) {
      setError(err.message || 'Something went wrong');
    }
    setLoading(false);
  };

  const handleSkip = () => onAuth(null);

  const fade = (d) => ({
    opacity: mounted ? 1 : 0, transform: mounted ? 'translateY(0)' : 'translateY(16px)',
    transition: `opacity 0.7s cubic-bezier(0.16,1,0.3,1) ${d}s, transform 0.7s cubic-bezier(0.16,1,0.3,1) ${d}s`
  });

  return (
    <div style={{ minHeight:'100vh', display:'flex', background:'#f8f8fa', fontFamily:'DM Sans, sans-serif',
      position:'relative', overflow:'hidden' }}>

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        .auth-ed-input {
          width: 100%; padding: 16px 0; background: transparent;
          border: none; border-bottom: 2px solid #1a1a1a;
          color: #1a1a1a; font-size: 22px; font-weight: 400; font-family: 'DM Sans', sans-serif;
          outline: none; transition: border-color 0.3s ease;
          letter-spacing: -0.01em;
        }
        .auth-ed-input:focus { border-bottom-color: #1a1a1a; }
        .auth-ed-input::placeholder { color: #b5b5a8; }
        .auth-arrow-btn {
          width: 56px; height: 56px; border: 2px solid #1a1a1a; background: transparent;
          cursor: pointer; display: flex; align-items: center; justify-content: center;
          transition: background 0.2s ease, color 0.2s ease; color: #1a1a1a;
        }
        .auth-arrow-btn:hover { background: #1a1a1a; color: #f8f8fa; }
        .auth-link { color: #888; cursor: pointer; transition: color 0.2s; text-decoration: none; }
        .auth-link:hover { color: #1a1a1a; }
      `}</style>

      {/* Left side — big typography */}
      <div style={{ flex:'0 0 45%', display:'flex', flexDirection:'column', justifyContent:'space-between',
        padding:'48px', minHeight:'100vh', ...fade(0.05) }}>
        <div>
          <div style={{ fontSize:'10px', fontWeight:600, letterSpacing:'0.15em', textTransform:'uppercase',
            color:'#888', marginBottom:'48px' }}>lightwork.app</div>
        </div>

        <div style={{ ...fade(0.3) }}>
          <div style={{ fontSize:'clamp(28px, 4vw, 42px)', fontWeight:500, letterSpacing:'0.06em', color:'#1a1a1a',
            lineHeight:1.1, marginBottom:'16px' }}>
            {mode === 'login' ? 'workspace login.' : mode === 'signup' ? 'create account.' : 'password reset.'}
          </div>
          <div style={{ fontSize:'11px', color:'#999', lineHeight:1.6, maxWidth:'280px' }}>
            {mode === 'login'
              ? 'Access your deals, content pipeline, and project management workspace.'
              : mode === 'signup'
              ? 'Create an account to sync your data across devices and collaborate with your team.'
              : 'Enter your email and we\'ll send you a link to reset your password.'}
          </div>
        </div>

        <div style={{ height:'20px' }} />
      </div>

      {/* Right side — form */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center',
        padding:'48px 64px', borderLeft:'1px solid #e0e0d8' }}>

        <div style={fade(0.15)}>
          {/* Label */}
          <div style={{ fontSize:'10px', fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase',
            color:'#888', marginBottom:'8px', textDecoration:'underline', textUnderlineOffset:'3px' }}>
            {mode === 'forgot' ? 'YOUR EMAIL' : 'WHO ARE YOU?'}
          </div>

          <form onSubmit={handleSubmit}>
            {/* Email — bracket-wrapped large input */}
            <div style={{ marginBottom:'32px' }}>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                placeholder="[ Your email ]" className="auth-ed-input" />
            </div>

            {mode !== 'forgot' && (
              <div style={{ marginBottom:'32px' }}>
                <div style={{ fontSize:'10px', fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase',
                  color:'#888', marginBottom:'8px', textDecoration:'underline', textUnderlineOffset:'3px' }}>
                  {mode === 'login' ? 'YOUR KEY' : 'CHOOSE A KEY'}
                </div>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                  placeholder="[ Your password ]" className="auth-ed-input" />
              </div>
            )}

            {error && <div style={{ fontSize:'12px', color:'#c0392b', marginBottom:'16px', fontWeight:500 }}>{error}</div>}
            {success && <div style={{ fontSize:'12px', color:'#27ae60', marginBottom:'16px', fontWeight:500 }}>{success}</div>}

            {/* Arrow submit button */}
            <div style={{ display:'flex', alignItems:'center', gap:'20px', marginBottom:'32px' }}>
              <button type="submit" disabled={loading} className="auth-arrow-btn">
                {loading ? (
                  <span style={{ width:'18px', height:'18px', border:'2px solid currentColor',
                    borderTopColor:'transparent', borderRadius:'50%', display:'block',
                    animation:'spin 0.6s linear infinite' }} />
                ) : (
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                    <path d="M7 17L17 7M17 7H7M17 7V17" />
                  </svg>
                )}
              </button>
              <span style={{ fontSize:'11px', color:'#999', letterSpacing:'0.06em', textTransform:'uppercase' }}>
                {loading ? (mode === 'login' ? 'SIGNING IN...' : 'CREATING...') :
                  (mode === 'login' ? 'SIGN IN' : mode === 'signup' ? 'CREATE ACCOUNT' : 'SEND RESET LINK')}
              </span>
            </div>
          </form>
        </div>

        {/* Footer nav */}
        <div style={{ ...fade(0.3) }}>
          <div style={{ display:'flex', gap:'24px', fontSize:'11px', letterSpacing:'0.06em', textTransform:'uppercase' }}>
            {mode === 'login' ? (
              <span className="auth-link" onClick={() => { setMode('signup'); setError(''); setSuccess(''); }}>
                CREATE ACCOUNT
              </span>
            ) : (
              <span className="auth-link" onClick={() => { setMode('login'); setError(''); setSuccess(''); }}>
                SIGN IN
              </span>
            )}
            {mode === 'login' && (
              <span className="auth-link" onClick={() => { setMode('forgot'); setError(''); setSuccess(''); }}>
                FORGOT PASSWORD
              </span>
            )}
            <span className="auth-link" onClick={handleSkip}>
              SKIP
            </span>
          </div>
        </div>

        {/* Bottom right corner */}
        <div style={{ position:'absolute', bottom:'32px', right:'48px', fontSize:'9px',
          color:'#ccc', letterSpacing:'0.1em', ...fade(0.5) }}>
          LW
        </div>
      </div>
    </div>
  );
}

/* ── Loading Screen ──────────────────────────────────────────────── */
function LoadingScreen({ onDone }) {
  const canvasRef = useRef(null);
  const [fadeOut, setFadeOut] = useState(false);
  const [showWord, setShowWord] = useState(false);
  const [pct, setPct] = useState(0);

  // Code particles
  const codeSnippets = useMemo(() => {
    const words = ['const','import','async','await','return','export','function','=>','{','}','[]','...','let','data','sync','null','true','0x','api','GET','POST','fetch','build','node','init','push','42','0.1','#ff','rgb','px','rem','grid','flex','map','key','src','ref'];
    return Array.from({ length: 24 }, (_, i) => ({
      text: words[i % words.length],
      left: 5 + Math.random() * 90,
      delay: Math.random() * 5,
      duration: 7 + Math.random() * 6,
      size: 9 + Math.random() * 2,
    }));
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H, cx, cy;
    const resize = () => {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = W / 2; cy = H / 2;
    };
    resize();
    window.addEventListener('resize', resize);

    const COUNT = 80;
    const RADIUS = 60;
    const DURATION = 5.0; // one smooth continuous motion
    const particles = [];
    const phi = (1 + Math.sqrt(5)) / 2;
    for (let i = 0; i < COUNT; i++) {
      const theta = 2 * Math.PI * i / (phi * phi);
      const r = Math.sqrt(i / COUNT) * RADIUS;
      const tx = Math.cos(theta) * r;
      const ty = Math.sin(theta) * r;
      const sAngle = Math.random() * Math.PI * 2;
      const sDist = 30 + Math.random() * 80;
      particles.push({
        sx: Math.cos(sAngle) * sDist, sy: Math.sin(sAngle) * sDist,
        tx, ty,
        size: 1.5 + Math.random() * 2.5,
        phase: Math.random() * Math.PI * 2,
      });
    }

    const startTime = performance.now();
    let raf;
    let lastPct = -1;

    const animate = (now) => {
      const t = (now - startTime) / 1000;
      const progress = Math.min(t / DURATION, 1); // 0 → 1 over DURATION
      ctx.clearRect(0, 0, W, H);

      // Smooth eased percentage
      const easedPct = Math.round(progress < 0.5
        ? 2 * progress * progress * 100
        : (1 - Math.pow(-2 * progress + 2, 2) / 2) * 100);
      if (easedPct !== lastPct) { lastPct = easedPct; setPct(easedPct); }

      // Continuous slow rotation
      const rotation = t * 0.15;
      // Gentle breathing that's always happening
      const breathe = 1 + Math.sin(t * 1.2) * 0.04;
      // Formation: eases in over first 60% of duration
      const formT = Math.min(t / (DURATION * 0.55), 1);
      const formEase = 1 - Math.pow(1 - formT, 3);
      // Fade out: last 15% of duration
      const fadeOut = t > DURATION * 0.85 ? Math.min((t - DURATION * 0.85) / (DURATION * 0.15), 1) : 0;
      const globalOpacity = 1 - fadeOut;

      particles.forEach(p => {
        // Interpolate from scattered to target
        const x = p.sx + (p.tx - p.sx) * formEase;
        const y = p.sy + (p.ty - p.sy) * formEase;
        // Apply rotation
        const rx = x * Math.cos(rotation) - y * Math.sin(rotation);
        const ry = x * Math.sin(rotation) + y * Math.cos(rotation);
        // Apply breathing
        const bx = rx * breathe;
        const by = ry * breathe;
        // Individual micro-movement
        const jx = Math.sin(t * 1.5 + p.phase) * 1.2;
        const jy = Math.cos(t * 1.8 + p.phase * 1.3) * 1.2;

        const drawX = cx + bx + jx;
        const drawY = cy + by + jy;
        const drawSize = p.size * (1 + Math.sin(t * 2 + p.phase) * 0.08);
        const op = Math.min(formEase * 2, 1) * globalOpacity * 0.85;

        ctx.beginPath();
        ctx.arc(drawX, drawY, Math.max(drawSize, 0.3), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(30,30,30,${op})`;
        ctx.fill();
      });

      // Draw percentage in center of cluster — monospace, code-like
      // Draw percentage centered — clear a circle behind it so it cuts over dots
      const pctStr = String(Math.min(easedPct, 100)).padStart(3, '0');
      const textOp = Math.min(formEase * 1.5, 0.7) * globalOpacity;
      const clearR = 18;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, clearR, 0, Math.PI * 2);
      ctx.fillStyle = '#f8f8fa';
      ctx.fill();
      ctx.restore();
      ctx.font = '500 13px "DM Sans", monospace';
      ctx.fillStyle = `rgba(30,30,30,${textOp})`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(pctStr, cx, cy);

      if (progress >= 1) {
        setPct(100);
        setFadeOut(true);
        setTimeout(() => onDone(), 500);
        return;
      }

      raf = requestAnimationFrame(animate);
    };

    setTimeout(() => setShowWord(true), 1800);

    raf = requestAnimationFrame(animate);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);

  return React.createElement('div', { className: `loading-screen ${fadeOut ? 'fade-out' : ''}` },
    // Code particles floating in background
    React.createElement('div', { className: 'loading-particles-bg' },
      codeSnippets.map((p, i) =>
        React.createElement('span', {
          key: i, className: 'loading-code-particle',
          style: { left: p.left+'%', fontSize: p.size+'px', animationDelay: p.delay+'s', animationDuration: p.duration+'s' }
        }, p.text)
      )
    ),
    React.createElement('canvas', { ref: canvasRef, className: 'loading-canvas', style: { position:'relative', zIndex:1 } }),
    React.createElement('div', { className: `loading-wordmark ${showWord ? 'visible' : ''}` }, 'l i g h t w o r k')
  );
}

const fmtFull = n => '$' + n.toLocaleString();
const fmtShort = n => { if (n >= 1e6) return '$'+(n/1e6).toFixed(1)+'M'; if (n >= 1e3) return '$'+Math.round(n/1e3)+'K'; return '$'+n; };

/* ── localStorage helper ───────────────────────────────────────────────── */
function usePersistedState(key, init) {
  const [state, setState] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : (typeof init === 'function' ? init() : init); }
    catch { return typeof init === 'function' ? init() : init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(state)); } catch {} }, [key, state]);
  return [state, setState];
}

const DEFAULT_PROFILE_COLORS = { culture:'#22d3ee','marc-randolph':'#a78bfa', quinn:'#fb923c', lightwork:'#34d399' };
const DEFAULT_PROFILES = [{ id:'culture',label:'@culture' },{ id:'marc-randolph',label:'Marc Randolph' },{ id:'quinn',label:'Quinn' },{ id:'lightwork',label:'Lightwork' }];

// Mutable globals — synced from App state so all components see updates

const timeAgo = (iso) => {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff/60000); if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins/60); if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs/24); if (days < 30) return days + 'd ago';
  return Math.floor(days/30) + 'mo ago';
};

/* ── Right-click Context Menu ──────────────────────────────────────────── */
function ContextMenu({ x, y, options, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    const k = (e) => { if (e.key === 'Escape') onClose(); };
    setTimeout(() => { document.addEventListener('click', h); document.addEventListener('contextmenu', h); document.addEventListener('keydown', k); }, 0);
    return () => { document.removeEventListener('click', h); document.removeEventListener('contextmenu', h); document.removeEventListener('keydown', k); };
  }, [onClose]);
  // Clamp to viewport
  const style = { position:'fixed', top: Math.min(y, window.innerHeight - 160), left: Math.min(x, window.innerWidth - 180), zIndex:200, background:'var(--dropdown-bg)', backdropFilter:'blur(16px)', WebkitBackdropFilter:'blur(16px)', border:'1px solid var(--border-light)', borderRadius:'var(--radius)', padding:'4px', minWidth:'160px', boxShadow:'0 12px 40px rgba(0,0,0,0.25), 0 0 20px rgba(var(--glow-rgb),0.06)' };
  return (
    <div ref={ref} className="dropdown-enter" style={style}>
      {options.map((opt, i) => opt.divider ? (
        <div key={i} style={{ height:'1px', background:'var(--border)', margin:'4px 0' }} />
      ) : (
        <button key={i} onClick={() => { opt.action(); onClose(); }}
          style={{ display:'flex', alignItems:'center', gap:'10px', padding:'8px 12px', width:'100%', background:'transparent', border:'none', borderRadius:'var(--radius-sm)', cursor:'pointer', color: opt.danger ? 'var(--red)' : 'var(--text-secondary)', fontSize:'12px', textAlign:'left', transition:'background 0.1s' }}
          onMouseEnter={e => e.currentTarget.style.background='var(--surface-hover)'}
          onMouseLeave={e => e.currentTarget.style.background='transparent'}>
          <span style={{ fontSize:'13px', width:'18px', textAlign:'center' }}>{opt.icon}</span>
          {opt.label}
        </button>
      ))}
    </div>
  );
}

/* ── Profile Switcher ──────────────────────────────────────────────────── */
function ProfileSwitcher({ active, onSwitch, counts }) {
  const [open, setOpen] = useState(false);
  const [glowing, setGlowing] = useState(false);
  const ref = useRef(null);
  const p = PROFILES.find(x => x.id === active);
  const color = PROFILE_COLORS[active];
  useEffect(() => {
    if (!open) return;
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const id = setTimeout(() => document.addEventListener('click', h), 0);
    return () => { clearTimeout(id); document.removeEventListener('click', h); };
  }, [open]);
  const handleSwitch = (id) => { onSwitch(id); setOpen(false); setGlowing(true); setTimeout(() => setGlowing(false), 600); };
  return (
    <div ref={ref} style={{ position:'relative', display:'inline-flex' }}>
      <button className={glowing ? 'glow-pulse' : ''} onClick={() => setOpen(!open)} style={{ display:'flex',alignItems:'center',gap:'8px',padding:'6px 14px 6px 10px',background:color+'18',border:`1px solid ${color}35`,borderRadius:'20px',cursor:'pointer',color:'var(--text)',fontSize:'13px',fontWeight:500,transition:'all 0.3s ease, box-shadow 0.3s ease' }}>
        <span style={{ width:'8px',height:'8px',borderRadius:'50%',background:color,transition:'background 0.3s ease' }} />
        {p?.label}
        <span style={{ fontSize:'11px',opacity:0.6 }}>{counts[active]||0}</span>
        <span style={{ fontSize:'10px',marginLeft:'2px',opacity:0.5,transition:'transform 0.2s ease',transform:open?'rotate(180deg)':'rotate(0)' }}>{'\u25BC'}</span>
      </button>
      {open && <div className="dropdown-enter" style={{ position:'absolute',top:'calc(100% + 6px)',left:0,zIndex:50,background:'var(--dropdown-bg)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',border:'1px solid var(--border-light)',borderRadius:'var(--radius)',padding:'4px',minWidth:'200px',boxShadow:'0 12px 40px rgba(0,0,0,0.15), 0 0 20px rgba(var(--glow-rgb),0.06)' }}>
        {PROFILES.map(pr => { const c = PROFILE_COLORS[pr.id]; const a = pr.id===active; return (
          <button key={pr.id} onClick={() => handleSwitch(pr.id)} style={{ display:'flex',alignItems:'center',gap:'10px',padding:'9px 12px',width:'100%',background:a?c+'15':'transparent',border:'none',borderRadius:'var(--radius-sm)',cursor:'pointer',color:a?'var(--text)':'var(--text-secondary)',fontSize:'13px',textAlign:'left' }}
            onMouseEnter={e => { if(!a) e.currentTarget.style.background='var(--surface-hover)'; }}
            onMouseLeave={e => { if(!a) e.currentTarget.style.background='transparent'; }}>
            <span style={{ width:'8px',height:'8px',borderRadius:'50%',background:c }} />
            <span style={{ flex:1 }}>{pr.label}</span>
            <span style={{ fontSize:'11px',color:'var(--text-muted)' }}>{counts[pr.id]||0}</span>
          </button>);
        })}
      </div>}
    </div>
  );
}

function CardDetail({ card, onClose, onUpdate, onArchive, color }) {
  const isDeal = card.value !== undefined;
  const [title, setTitle] = useState(card.title || '');
  const [value, setValue] = useState(card.value != null ? String(card.value) : '');
  const [assignee, setAssignee] = useState(card.assignee || '');
  const [type, setType] = useState(card.type || '');
  const [stage, setStage] = useState(card.stage || '');
  const [platforms, setPlatforms] = useState((card.platforms || []).join(', '));
  const [notes, setNotes] = useState(card.notes || '');
  const [images, setImages] = useState(card.images || []);
  const [dueDate, setDueDate] = useState(card.dueDate || '');
  const fileRef = useRef(null);

  const handleImageAdd = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(f => {
      const reader = new FileReader();
      reader.onload = (ev) => setImages(prev => [...prev, ev.target.result]);
      reader.readAsDataURL(f);
    });
  };

  const save = () => {
    const updated = { ...card, title, notes, images, dueDate, stage };
    if (isDeal) { updated.value = parseInt(value) || 0; updated.assignee = assignee; }
    else { updated.type = type; updated.platforms = platforms.split(',').map(s=>s.trim()).filter(Boolean); }
    onUpdate(updated); onClose();
  };
  const removeImage = (i) => setImages(prev => prev.filter((_, idx) => idx !== i));

  const labelStyle = { fontSize:'11px',fontWeight:600,color:'var(--text-muted)',letterSpacing:'0.04em',textTransform:'uppercase',marginBottom:'8px' };
  const fieldStyle = { width:'100%',padding:'9px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',fontSize:'13px',color:'var(--text)' };
  const stageOptions = isDeal ? DEAL_STAGES : CONTENT_STAGES;

function DropColumn({ stageKey, label, count, totalValue, children, onDrop, onRenameLabel }) {
  const [over, setOver] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState(label);
  const inputRef = useRef(null);
  const empty = !children || (Array.isArray(children) && children.length === 0);
  useEffect(() => { if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, [editing]);
  const saveLabel = () => {
    if (editVal.trim() && editVal.trim() !== label && onRenameLabel) onRenameLabel(stageKey, editVal.trim());
    setEditing(false);
  };
  return (
    <div
      onDragOver={e => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={e => { e.preventDefault(); setOver(false); if (dragData) onDrop(dragData.id, stageKey); }}
      className={over ? 'drop-target' : ''}
      style={{ flex:'1 1 0',minWidth:'200px',padding:'4px',transition:'background 0.15s' }}
    >
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px',padding:'0 2px' }}>
        <div style={{ display:'flex',alignItems:'baseline',gap:'8px' }}>
          {editing ? (
            <input ref={inputRef} value={editVal} onChange={e => setEditVal(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') saveLabel(); if (e.key === 'Escape') setEditing(false); }}
              onBlur={saveLabel}
              style={{ fontSize:'11px',fontWeight:600,letterSpacing:'0.05em',color:'var(--text-secondary)',background:'transparent',border:'none',borderBottom:'1px solid var(--border)',outline:'none',padding:'0 0 2px',textTransform:'uppercase',width:'100px' }} />
          ) : (
            <span
              onDoubleClick={() => { if (onRenameLabel) { setEditVal(label); setEditing(true); } }}
              title={onRenameLabel ? 'Double-click to rename' : ''}
              style={{ fontSize:'11px',fontWeight:600,letterSpacing:'0.05em',color:'var(--text-secondary)',cursor: onRenameLabel ? 'text' : 'default' }}>{label}</span>
          )}
          <span style={{ fontSize:'11px',color:'var(--text-muted)' }}>{count}</span>
        </div>
        {totalValue != null && totalValue > 0 && <span style={{ fontSize:'11px',fontWeight:500,color:'var(--text-muted)' }}>{fmtShort(totalValue)}</span>}
      </div>
      <div style={{ display:'flex',flexDirection:'column',gap:'6px',minHeight:'100px' }}>

  );

/* ── Animated Number ────────────────────────────────────────────────────── */
function AnimatedValue({ value, prefix='$' }) {
  const [display, setDisplay] = useState(value);
  const prevRef = useRef(value);
  const chars = '0123456789';
  const intervalRef = useRef(null);

  useEffect(() => {
    if (prevRef.current === value) return;
    const target = value.toLocaleString();
    let iteration = 0;
    clearInterval(intervalRef.current);
    intervalRef.current = setInterval(() => {
      setDisplay(prev => {
        const result = target.split('').map((ch, i) => {
          if (ch === ',' || ch === '.') return ch;
          if (i < iteration) return target[i];
          return chars[Math.floor(Math.random() * chars.length)];
        }).join('');
        return result;
      });
      iteration += 0.5;
      if (iteration >= target.length) {
        clearInterval(intervalRef.current);
        setDisplay(target);
      }
    }, 25);
    prevRef.current = value;
    return () => clearInterval(intervalRef.current);
  }, [value]);

  useEffect(() => { setDisplay(value.toLocaleString()); }, []);

  return <span>{prefix}{typeof display === 'number' ? display.toLocaleString() : display}</span>;
}

function IdeaCard({ idea, onDelete, onStar, onConvert, onUpdate }) {

    <>

        {hoverX && <button onClick={e=>{e.stopPropagation();setConfirmDel(true);}} style={{ background:'transparent',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'14px',lineHeight:1,transition:'color 0.15s',padding:'2px' }}
          onMouseEnter={e=>e.currentTarget.style.color='var(--red)'} onMouseLeave={e=>e.currentTarget.style.color='var(--text-muted)'}>&times;</button>}
      </div>

          </div>
          <div style={{ display:'flex',gap:'6px',justifyContent:'flex-end' }}>

            <button onClick={saveEdit} style={{ padding:'5px 12px',background:'var(--green)',border:'none',borderRadius:'var(--radius-sm)',color:'#fff',cursor:'pointer',fontSize:'11px',fontWeight:600 }}>Save · ⌘↵</button>
          </div>

        <>
          <div style={{ fontSize:'13.5px',fontWeight:500,lineHeight:1.55,marginBottom:'8px',paddingRight:'50px',color:'var(--text)' }}>{idea.text}</div>

    return (i.text + i.tags.join(' ') + (i.source||'')).toLowerCase().includes(search.toLowerCase());

      {adding && (

          <textarea ref={inputRef} value={newText} onChange={e=>setNewText(e.target.value)} placeholder="What's the idea? Paste a comment, jot a thought..." rows={3}
            style={{ width:'100%',fontSize:'13px',lineHeight:1.6,marginBottom:'10px',padding:'8px 0' }}

/* ── Calendar View ─────────────────────────────────────────────────────── */
function CalendarView({ deals, content, activeProfile }) {
  const realToday = new Date();
  const [viewDate, setViewDate] = useState(new Date(realToday.getFullYear(), realToday.getMonth(), 1));
  const [viewMode, setViewMode] = useState('month'); // month | week
  const [calEvents, setCalEvents] = usePersistedState('studio-cal-events', []);
  const [selectedDay, setSelectedDay] = useState(null);
  const [addingEvent, setAddingEvent] = useState(false);
  const [newTitle, setNewTitle] = useState('');
  const [newTime, setNewTime] = useState('09:00');
  const [newEndTime, setNewEndTime] = useState('10:00');
  const [newColor, setNewColor] = useState('var(--green)');
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [editingEvent, setEditingEvent] = useState(null);

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const monthName = viewDate.toLocaleString('default', { month:'long', year:'numeric' });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayDate = realToday.getDate();
  const todayMonth = realToday.getMonth();
  const todayYear = realToday.getFullYear();
  const isCurrentMonth = month === todayMonth && year === todayYear;

  const prevMonth = () => setViewDate(new Date(year, month - 1, 1));
  const nextMonth = () => setViewDate(new Date(year, month + 1, 1));
  const goToday = () => setViewDate(new Date(todayYear, todayMonth, 1));

  // Week view helpers
  const getWeekStart = () => {
    const d = new Date(realToday);
    d.setDate(d.getDate() - d.getDay());
    return d;
  };
  const [weekStart, setWeekStart] = useState(getWeekStart());
  const prevWeek = () => { const d = new Date(weekStart); d.setDate(d.getDate() - 7); setWeekStart(d); };
  const nextWeek = () => { const d = new Date(weekStart); d.setDate(d.getDate() + 7); setWeekStart(d); };
  const weekDays = Array.from({ length: 7 }, (_, i) => { const d = new Date(weekStart); d.setDate(d.getDate() + i); return d; });

  // Build all events (from deals, content, and custom)
  const getAllEvents = (filterMonth, filterYear) => {
    const evts = [];
    // Custom events
    calEvents.forEach(ev => {
      const d = new Date(ev.date);
      if (d.getMonth() === filterMonth && d.getFullYear() === filterYear) {
        evts.push({ ...ev, day: d.getDate(), source: 'custom' });
      }
    });
    // Deal events
    Object.entries(deals).forEach(([pid, ds]) => {
      const c = PROFILE_COLORS[pid] || '#777';
      const pLabel = (PROFILES.find(p=>p.id===pid)||{}).label || pid;
      ds.forEach(d => {
        if (d.dueDate) {
          const dd = new Date(d.dueDate);
          if (dd.getMonth() === filterMonth && dd.getFullYear() === filterYear) {
            evts.push({ id:'deal-'+d.id, title: d.title.split('//')[0].trim(), day: dd.getDate(), date: d.dueDate, time: '09:00', endTime: '10:00', color: c, source:'deal', profile: pLabel });
          }
        }
      });
    });
    // Content events
    Object.entries(content).forEach(([pid, cs]) => {
      const c = PROFILE_COLORS[pid] || '#777';
      const pLabel = (PROFILES.find(p=>p.id===pid)||{}).label || pid;
      cs.forEach(item => {
        if (item.dueDate) {
          const dd = new Date(item.dueDate);
          if (dd.getMonth() === filterMonth && dd.getFullYear() === filterYear) {
            evts.push({ id:'content-'+item.id, title: item.title, day: dd.getDate(), date: item.dueDate, time: '10:00', endTime: '11:00', color: c, source:'content', profile: pLabel });
          }
        }
      });
    });
    return evts;
  };

  const monthEvents = getAllEvents(month, year);
  const getEventsForDay = (day) => monthEvents.filter(e => e.day === day);

  // Get events for a specific date (week view)
  const getEventsForDate = (date) => {
    const m = date.getMonth(); const y = date.getFullYear(); const d = date.getDate();
    return getAllEvents(m, y).filter(e => e.day === d);
  };

  // Hours for week view
  const hours = Array.from({ length: 14 }, (_, i) => i + 7); // 7am to 8pm

  // Add custom event
  const addEvent = () => {
    if (!newTitle.trim() || !selectedDay) return;
    const dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(selectedDay).padStart(2,'0');
    const ev = { id: 'ev-' + Date.now(), title: newTitle.trim(), date: dateStr, time: newTime, endTime: newEndTime, color: newColor, profile: activeProfile };
    setCalEvents(prev => [...prev, ev]);
    setNewTitle(''); setAddingEvent(false); setNewTime('09:00'); setNewEndTime('10:00');
  };

  // Delete custom event
  const deleteEvent = (evId) => { setCalEvents(prev => prev.filter(e => e.id !== evId)); setSelectedEvent(null); };

  // Export to ICS
  const exportICS = (ev) => {
    const d = ev.date.replace(/-/g, '');
    const t = (ev.time || '09:00').replace(':', '') + '00';
    const et = (ev.endTime || '10:00').replace(':', '') + '00';
    const ics = ['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT',
      'DTSTART:'+d+'T'+t, 'DTEND:'+d+'T'+et,
      'SUMMARY:'+ev.title, 'END:VEVENT','END:VCALENDAR'].join('\r\n');
    const blob = new Blob([ics], { type:'text/calendar' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = ev.title.replace(/[^a-z0-9]/gi, '_') + '.ics'; a.click();
  };

  const eventColors = ['var(--green)','var(--purple)','var(--cyan)','var(--orange)','var(--blue)','var(--red)','var(--yellow)'];

  // Month grid
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  // Side panel for selected day
  const dayPanel = selectedDay !== null;
  const panelEvents = selectedDay ? getEventsForDay(selectedDay) : [];
  const selectedDayName = selectedDay ? new Date(year, month, selectedDay).toLocaleDateString('default', { weekday:'long', month:'short', day:'numeric' }) : '';

  return (
    <div style={{ flex:1,display:'flex',overflow:'hidden' }}>
      {/* Main calendar area */}
      <div style={{ flex:1,overflow:'auto',padding:'28px 32px',display:'flex',flexDirection:'column' }}>
        {/* Header */}
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px' }}>
          <div style={{ display:'flex',alignItems:'center',gap:'16px' }}>
            <h1 style={{ fontSize:'18px',fontWeight:600,minWidth:'200px' }}>{monthName}</h1>
            <div style={{ display:'flex',gap:'4px' }}>
              <button onClick={viewMode==='month'?prevMonth:prevWeek} style={{ padding:'5px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-secondary)',cursor:'pointer',fontSize:'13px' }}>&lsaquo;</button>
              <button onClick={goToday} style={{ padding:'5px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text)',cursor:'pointer',fontSize:'12px',fontWeight:500 }}>Today</button>
              <button onClick={viewMode==='month'?nextMonth:nextWeek} style={{ padding:'5px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-secondary)',cursor:'pointer',fontSize:'13px' }}>&rsaquo;</button>
            </div>
          </div>
          <div style={{ display:'flex',gap:'0',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',overflow:'hidden' }}>
            <button onClick={() => setViewMode('month')} style={{ padding:'6px 14px',background:viewMode==='month'?'var(--surface)':'transparent',border:'none',color:viewMode==='month'?'var(--text)':'var(--text-muted)',cursor:'pointer',fontSize:'12px',fontWeight:500 }}>Month</button>
            <button onClick={() => setViewMode('week')} style={{ padding:'6px 14px',background:viewMode==='week'?'var(--surface)':'transparent',border:'none',borderLeft:'1px solid var(--border)',color:viewMode==='week'?'var(--text)':'var(--text-muted)',cursor:'pointer',fontSize:'12px',fontWeight:500 }}>Week</button>
          </div>
        </div>

        {viewMode === 'month' ? (
          /* ── Month View ── */
          <div style={{ flex:1,display:'flex',flexDirection:'column' }}>
            <div style={{ display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'1px',background:'var(--border)',borderRadius:'var(--radius)',overflow:'hidden',flex:1 }}>
              {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
                <div key={d} style={{ padding:'8px',fontSize:'10px',fontWeight:600,letterSpacing:'0.04em',color:'var(--text-muted)',textTransform:'uppercase',background:'var(--surface)',textAlign:'center' }}>{d}</div>
              ))}
              {cells.map((day, i) => {
                const isToday = isCurrentMonth && day === todayDate;
                const dayEvts = day ? getEventsForDay(day) : [];
                const isSelected = day === selectedDay;
                return (
                  <div key={i} onClick={() => { if(day) { setSelectedDay(day); setSelectedEvent(null); } }}
                    style={{ minHeight:'90px',padding:'6px 8px',background:isSelected?'var(--surface-hover)':isToday?'rgba(var(--glow-rgb),0.03)':'var(--bg)',cursor:day?'pointer':'default',transition:'background 0.15s',position:'relative',borderLeft:isSelected?'2px solid var(--green)':'2px solid transparent' }}
                    onMouseEnter={e => { if(day && !isSelected) e.currentTarget.style.background='var(--surface-hover)'; }}
                    onMouseLeave={e => { if(day && !isSelected) e.currentTarget.style.background=isToday?'rgba(var(--glow-rgb),0.03)':'var(--bg)'; }}>
                    {day && <>
                      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'3px' }}>
                        <span style={{ fontSize:'12px',fontWeight:isToday?700:400,color:isToday?'var(--green)':'var(--text-secondary)',display:'inline-flex',alignItems:'center',justifyContent:'center',width:'22px',height:'22px',borderRadius:'50%',background:isToday?'var(--green)20':'transparent' }}>{day}</span>
                        {dayEvts.length > 0 && <span style={{ fontSize:'9px',color:'var(--text-muted)' }}>{dayEvts.length}</span>}
                      </div>
                      {dayEvts.slice(0, 3).map((ev,j) => (
                        <div key={j} onClick={e => { e.stopPropagation(); setSelectedEvent(ev); setSelectedDay(day); }}
                          style={{ fontSize:'10px',fontWeight:500,padding:'2px 5px',marginTop:'2px',borderRadius:'3px',borderLeft:'2px solid '+ev.color,background:ev.color+'10',color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',cursor:'pointer',transition:'background 0.15s' }}
                          onMouseEnter={e => e.currentTarget.style.background=ev.color+'22'}
                          onMouseLeave={e => e.currentTarget.style.background=ev.color+'10'}>
                          <span style={{ color:ev.color,marginRight:'4px',fontSize:'9px' }}>{ev.time || ''}</span>{ev.title}
                        </div>
                      ))}
                      {dayEvts.length > 3 && <div style={{ fontSize:'9px',color:'var(--text-muted)',marginTop:'2px',paddingLeft:'4px' }}>+{dayEvts.length-3} more</div>}
                    </>}
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          /* ── Week View ── */
          <div style={{ flex:1,overflow:'auto',display:'flex',flexDirection:'column' }}>
            {/* Week day headers */}
            <div style={{ display:'grid',gridTemplateColumns:'50px repeat(7,1fr)',gap:'1px',background:'var(--border)',borderRadius:'var(--radius) var(--radius) 0 0',overflow:'hidden' }}>
              <div style={{ background:'var(--surface)',padding:'8px' }} />
              {weekDays.map((d, i) => {
                const isToday = d.getDate()===todayDate && d.getMonth()===todayMonth && d.getFullYear()===todayYear;
                return (
                  <div key={i} style={{ padding:'8px',background:'var(--surface)',textAlign:'center' }}>
                    <div style={{ fontSize:'10px',fontWeight:600,letterSpacing:'0.04em',color:'var(--text-muted)',textTransform:'uppercase' }}>{d.toLocaleDateString('default',{weekday:'short'})}</div>
                    <div style={{ fontSize:'18px',fontWeight:isToday?700:400,color:isToday?'var(--green)':'var(--text)',marginTop:'2px' }}>{d.getDate()}</div>
                  </div>
                );
              })}
            </div>
            {/* Time grid */}
            <div style={{ flex:1,overflow:'auto',display:'grid',gridTemplateColumns:'50px repeat(7,1fr)',gap:'1px',background:'var(--border)',borderRadius:'0 0 var(--radius) var(--radius)' }}>
              {hours.map(h => (
                <React.Fragment key={h}>
                  <div style={{ padding:'4px 6px',fontSize:'10px',color:'var(--text-muted)',background:'var(--surface)',textAlign:'right',height:'48px' }}>{h>12?(h-12)+'pm':h===12?'12pm':h+'am'}</div>
                  {weekDays.map((d, di) => {
                    const dayEvts = getEventsForDate(d);
                    const hourEvts = dayEvts.filter(ev => { const t = parseInt((ev.time||'09:00').split(':')[0]); return t === h; });
                    return (
                      <div key={di} onClick={() => { setSelectedDay(d.getDate()); setViewDate(new Date(d.getFullYear(), d.getMonth(), 1)); }}
                        style={{ background:'var(--bg)',height:'48px',padding:'2px',cursor:'pointer',position:'relative' }}
                        onMouseEnter={e => e.currentTarget.style.background='var(--surface-hover)'}
                        onMouseLeave={e => e.currentTarget.style.background='var(--bg)'}>
                        {hourEvts.map((ev, ei) => (
                          <div key={ei} onClick={e => { e.stopPropagation(); setSelectedEvent(ev); setSelectedDay(d.getDate()); setViewDate(new Date(d.getFullYear(), d.getMonth(), 1)); }}
                            style={{ fontSize:'10px',fontWeight:500,padding:'3px 5px',borderRadius:'3px',borderLeft:'2px solid '+ev.color,background:ev.color+'15',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer',marginBottom:'1px' }}>
                            {ev.title}
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── Day detail side panel ── */}
      {dayPanel && (
        <div style={{ width:'300px',minWidth:'300px',borderLeft:'1px solid var(--border)',background:'var(--surface)',padding:'20px',overflow:'auto',display:'flex',flexDirection:'column' }}>
          <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'18px' }}>
            <div>
              <div style={{ fontSize:'14px',fontWeight:600 }}>{selectedDayName}</div>
              <div style={{ fontSize:'11px',color:'var(--text-muted)',marginTop:'2px' }}>{panelEvents.length} event{panelEvents.length!==1?'s':''}</div>
            </div>
            <button onClick={() => { setSelectedDay(null); setSelectedEvent(null); }} style={{ background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'16px' }}>&times;</button>
          </div>

          {/* Event list */}
          {panelEvents.map(ev => (
            <div key={ev.id} onClick={() => setSelectedEvent(selectedEvent && selectedEvent.id===ev.id ? null : ev)}
              style={{ padding:'10px 12px',background:selectedEvent && selectedEvent.id===ev.id?ev.color+'12':'var(--bg)',border:'1px solid '+(selectedEvent && selectedEvent.id===ev.id?ev.color+'30':'var(--border)'),borderRadius:'var(--radius-sm)',marginBottom:'6px',cursor:'pointer',transition:'all 0.15s' }}>
              <div style={{ display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px' }}>
                <span style={{ width:'6px',height:'6px',borderRadius:'50%',background:ev.color }} />
                <span style={{ fontSize:'12px',fontWeight:500,flex:1 }}>{ev.title}</span>
              </div>
              <div style={{ fontSize:'11px',color:'var(--text-muted)',paddingLeft:'14px' }}>{ev.time || '09:00'} - {ev.endTime || '10:00'}</div>
              {ev.profile && <div style={{ fontSize:'10px',color:'var(--text-muted)',paddingLeft:'14px',marginTop:'2px' }}>{typeof ev.profile === 'string' && PROFILES.find(p=>p.id===ev.profile) ? PROFILES.find(p=>p.id===ev.profile).label : ev.profile}</div>}

              {/* Expanded event detail */}
              {selectedEvent && selectedEvent.id === ev.id && (
                <div style={{ marginTop:'10px',paddingTop:'10px',borderTop:'1px solid var(--border)',display:'flex',gap:'6px',flexWrap:'wrap' }}>
                  <button onClick={e => { e.stopPropagation(); exportICS(ev); }} style={{ padding:'4px 10px',background:'transparent',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-secondary)',fontSize:'10px',cursor:'pointer' }}>Export .ics</button>
                  {ev.source === 'custom' && (
                    <button onClick={e => { e.stopPropagation(); deleteEvent(ev.id); }} style={{ padding:'4px 10px',background:'transparent',border:'1px solid var(--red)',borderRadius:'var(--radius-sm)',color:'var(--red)',fontSize:'10px',cursor:'pointer' }}>Delete</button>
                  )}
                  <div style={{ fontSize:'10px',color:'var(--text-muted)',width:'100%',marginTop:'4px' }}>{ev.source === 'deal' ? 'From deals' : ev.source === 'content' ? 'From content' : 'Custom event'}</div>
                </div>
              )}
            </div>
          ))}

          {panelEvents.length === 0 && !addingEvent && (
            <div style={{ flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',fontSize:'12px' }}>No events</div>
          )}

          {/* Add event form */}
          {addingEvent ? (
            <div style={{ marginTop:'auto',padding:'14px',background:'var(--bg)',border:'1px dashed var(--green)',borderRadius:'var(--radius-sm)' }}>
              <div style={{ fontSize:'11px',fontWeight:600,color:'var(--text-muted)',marginBottom:'10px' }}>NEW EVENT</div>
              <input autoFocus value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="Event title..."
                onKeyDown={e => { if(e.key==='Enter') addEvent(); if(e.key==='Escape') setAddingEvent(false); }}
                style={{ fontSize:'13px',width:'100%',padding:'6px 8px',background:'var(--surface)',borderRadius:'4px',border:'1px solid var(--border)',marginBottom:'8px' }} />
              <div style={{ display:'flex',gap:'8px',marginBottom:'8px' }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:'10px',color:'var(--text-muted)',marginBottom:'4px' }}>Start</div>
                  <input type="time" value={newTime} onChange={e=>setNewTime(e.target.value)}
                    style={{ fontSize:'12px',width:'100%',padding:'4px 6px',background:'var(--surface)',borderRadius:'4px',border:'1px solid var(--border)',colorScheme:'dark' }} />
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:'10px',color:'var(--text-muted)',marginBottom:'4px' }}>End</div>
                  <input type="time" value={newEndTime} onChange={e=>setNewEndTime(e.target.value)}
                    style={{ fontSize:'12px',width:'100%',padding:'4px 6px',background:'var(--surface)',borderRadius:'4px',border:'1px solid var(--border)',colorScheme:'dark' }} />
                </div>
              </div>
              <div style={{ display:'flex',gap:'4px',marginBottom:'10px' }}>
                {eventColors.map(c => (
                  <button key={c} onClick={() => setNewColor(c)}
                    style={{ width:'18px',height:'18px',borderRadius:'50%',background:c,border:c===newColor?'2px solid var(--text)':'2px solid transparent',cursor:'pointer',padding:0 }} />
                ))}
              </div>
              <div style={{ display:'flex',gap:'6px' }}>
                <button onClick={addEvent} style={{ flex:1,padding:'6px',background:'var(--green)',border:'none',borderRadius:'var(--radius-sm)',color:'#fff',fontSize:'12px',fontWeight:600,cursor:'pointer' }}>Add Event</button>
                <button onClick={() => { setAddingEvent(false); setNewTitle(''); }} style={{ padding:'6px 12px',background:'transparent',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',color:'var(--text-muted)',fontSize:'12px',cursor:'pointer' }}>Cancel</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setAddingEvent(true)}
              style={{ marginTop:'auto',padding:'10px',background:'transparent',border:'1px solid var(--border-light)',borderRadius:'var(--radius-sm)',color:'var(--text-secondary)',fontSize:'12px',cursor:'pointer',width:'100%',textAlign:'center' }}>+ Add event</button>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Settings View ─────────────────────────────────────────────────────── */
function SettingsView({ theme, setTheme, onProfilesChange, user, onLogout }) {
  const [profiles, setProfiles] = useState([...PROFILES]);
  const [colors, setColors] = useState({ ...PROFILE_COLORS });
  const [editingId, setEditingId] = useState(null);
  const [editLabel, setEditLabel] = useState('');
  const [addingNew, setAddingNew] = useState(false);
  const [newLabel, setNewLabel] = useState('');
  const [newColor, setNewColor] = useState(AVAILABLE_COLORS[0]);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const saveProfiles = (newProfiles, newColors) => {
    PROFILES.length = 0; newProfiles.forEach(p => PROFILES.push(p));
    Object.keys(PROFILE_COLORS).forEach(k => delete PROFILE_COLORS[k]);
    Object.assign(PROFILE_COLORS, newColors);
    localStorage.setItem('studio-profiles', JSON.stringify(newProfiles));
    localStorage.setItem('studio-profile-colors', JSON.stringify(newColors));
    setProfiles([...newProfiles]);
    setColors({ ...newColors });
    if (onProfilesChange) onProfilesChange();
  };

  const startEdit = (p) => { setEditingId(p.id); setEditLabel(p.label); };
  const saveEdit = () => {
    if (!editLabel.trim()) return;
    const np = profiles.map(p => p.id === editingId ? { ...p, label: editLabel.trim() } : p);
    saveProfiles(np, colors);
    setEditingId(null);
  };
  const changeColor = (pid, color) => { const nc = { ...colors, [pid]: color }; saveProfiles(profiles, nc); };
  const addProfile = () => {
    if (!newLabel.trim()) return;
    const id = newLabel.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    if (profiles.find(p => p.id === id)) return;
    const np = [...profiles, { id, label: newLabel.trim() }];
    const nc = { ...colors, [id]: newColor };
    saveProfiles(np, nc);
    setNewLabel(''); setAddingNew(false); setNewColor(AVAILABLE_COLORS[Math.floor(Math.random()*AVAILABLE_COLORS.length)]);
  };
  const deleteProfile = (pid) => {
    const np = profiles.filter(p => p.id !== pid);
    const nc = { ...colors }; delete nc[pid];
    saveProfiles(np, nc);
    setConfirmDelete(null);
  };

  return (
    <div style={{ flex:1,overflow:'auto',padding:'28px 32px',maxWidth:'600px' }}>
      <h1 style={{ fontSize:'15px',fontWeight:600,marginBottom:'24px' }}>Settings</h1>

      <div style={{ marginBottom:'28px' }}>
        <div style={{ fontSize:'11px',fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:'10px' }}>Appearance</div>
        <div style={{ display:'flex',gap:'8px' }}>
          {['dark','light'].map(t => (
            <button key={t} onClick={() => { setTheme(t); document.documentElement.setAttribute('data-theme', t); }}
              style={{ padding:'10px 20px',background:theme===t?'var(--surface-hover)':'var(--surface)',border:'1px solid '+(theme===t?'var(--green)':'var(--border)'),borderRadius:'var(--radius)',cursor:'pointer',color:theme===t?'var(--text)':'var(--text-secondary)',fontSize:'13px',fontWeight:500,textTransform:'capitalize' }}>{t} mode</button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom:'28px' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px' }}>
          <div style={{ fontSize:'11px',fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',color:'var(--text-muted)' }}>Profiles</div>
          {!addingNew && <button onClick={() => setAddingNew(true)} style={{ padding:'4px 12px',background:'transparent',border:'1px solid var(--border-light)',borderRadius:'var(--radius-sm)',color:'var(--text-secondary)',fontSize:'11px',cursor:'pointer' }}>+ Add</button>}
        </div>

        {profiles.map(p => { const c = colors[p.id] || '#888'; return (
          <div key={p.id} style={{ display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',marginBottom:'6px' }}>
            {/* Color picker */}
            <div style={{ position:'relative' }}>
              <button onClick={() => setEditingId(editingId === p.id+'_color' ? null : p.id+'_color')} style={{ width:'20px',height:'20px',borderRadius:'50%',background:c,border:'2px solid var(--border-light)',cursor:'pointer',padding:0 }} />
              {editingId === p.id+'_color' && (
                <div style={{ position:'absolute',top:'100%',left:0,zIndex:50,background:'var(--dropdown-bg)',backdropFilter:'blur(16px)',border:'1px solid var(--border-light)',borderRadius:'var(--radius)',padding:'8px',display:'flex',gap:'4px',flexWrap:'wrap',width:'140px',marginTop:'4px',boxShadow:'0 8px 24px rgba(0,0,0,0.2)' }}>
                  {AVAILABLE_COLORS.map(clr => (
                    <button key={clr} onClick={() => { changeColor(p.id, clr); setEditingId(null); }}
                      style={{ width:'22px',height:'22px',borderRadius:'50%',background:clr,border:clr===c?'2px solid var(--text)':'2px solid transparent',cursor:'pointer',padding:0 }} />
                  ))}
                </div>
              )}
            </div>

            {/* Label — editable on click */}
            {editingId === p.id ? (
              <input autoFocus value={editLabel} onChange={e => setEditLabel(e.target.value)}
                onBlur={saveEdit} onKeyDown={e => { if(e.key==='Enter') saveEdit(); if(e.key==='Escape') setEditingId(null); }}
                style={{ fontSize:'13px',flex:1,padding:'2px 6px',background:'var(--surface-hover)',borderRadius:'4px',border:'1px solid var(--border-light)' }} />
            ) : (
              <span onClick={() => startEdit(p)} style={{ fontSize:'13px',flex:1,cursor:'text' }}>{p.label}</span>
            )}

            {/* Edit button */}
            {editingId !== p.id && (
              <button onClick={() => startEdit(p)} style={{ background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'11px',padding:'2px 6px' }}>edit</button>
            )}

            {/* Delete button */}
            {confirmDelete === p.id ? (
              <div style={{ display:'flex',gap:'4px',alignItems:'center' }}>
                <span style={{ fontSize:'11px',color:'var(--red)' }}>delete?</span>
                <button onClick={() => deleteProfile(p.id)} style={{ background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:'11px',fontWeight:600 }}>yes</button>
                <button onClick={() => setConfirmDelete(null)} style={{ background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'11px' }}>no</button>
              </div>
            ) : (
              <button onClick={() => setConfirmDelete(p.id)} style={{ background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'13px',padding:'2px 6px',opacity:0.5 }}
                onMouseEnter={e => e.currentTarget.style.opacity=1} onMouseLeave={e => e.currentTarget.style.opacity=0.5}>&times;</button>
            )}
          </div>);
        })}

        {/* Add new profile */}
        {addingNew && (
          <div style={{ display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',background:'var(--surface)',border:'1px dashed var(--green)',borderRadius:'var(--radius-sm)',marginBottom:'6px' }}>
            <div style={{ position:'relative' }}>
              <button onClick={() => setEditingId(editingId === '_new_color' ? null : '_new_color')} style={{ width:'20px',height:'20px',borderRadius:'50%',background:newColor,border:'2px solid var(--border-light)',cursor:'pointer',padding:0 }} />
              {editingId === '_new_color' && (
                <div style={{ position:'absolute',top:'100%',left:0,zIndex:50,background:'var(--dropdown-bg)',backdropFilter:'blur(16px)',border:'1px solid var(--border-light)',borderRadius:'var(--radius)',padding:'8px',display:'flex',gap:'4px',flexWrap:'wrap',width:'140px',marginTop:'4px',boxShadow:'0 8px 24px rgba(0,0,0,0.2)' }}>
                  {AVAILABLE_COLORS.map(clr => (
                    <button key={clr} onClick={() => { setNewColor(clr); setEditingId(null); }}
                      style={{ width:'22px',height:'22px',borderRadius:'50%',background:clr,border:clr===newColor?'2px solid var(--text)':'2px solid transparent',cursor:'pointer',padding:0 }} />
                  ))}
                </div>
              )}
            </div>
            <input autoFocus value={newLabel} onChange={e => setNewLabel(e.target.value)} placeholder="Profile name..."
              onKeyDown={e => { if(e.key==='Enter') addProfile(); if(e.key==='Escape') { setAddingNew(false); setNewLabel(''); } }}
              style={{ fontSize:'13px',flex:1,padding:'2px 6px' }} />
            <button onClick={addProfile} style={{ background:'none',border:'none',color:'var(--green)',cursor:'pointer',fontSize:'12px',fontWeight:600 }}>Add</button>
            <button onClick={() => { setAddingNew(false); setNewLabel(''); }} style={{ background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'13px' }}>&times;</button>
          </div>
        )}
      </div>

      {/* Account */}
      <div style={{ marginBottom:'28px' }}>
        <div style={{ fontSize:'11px',fontWeight:600,letterSpacing:'0.04em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:'10px' }}>Account</div>
        {user ? (
          <div>
            <div style={{ display:'flex',alignItems:'center',gap:'10px',padding:'12px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',marginBottom:'8px' }}>

/* ── Scramble Logo ──────────────────────────────────────────────────────── */
function ScrambleLogo() {
  const words = ['s t u d i o', 'i p    l a b', 'l i g h t w o r k'];
  const chars = 'abcdefghijklmnopqrstuvwxyz!@#$%^&*()_+{}|:<>?0123456789';
  const [display, setDisplay] = useState(words[0]);
  const [hovering, setHovering] = useState(false);
  const targetRef = useRef(0);
  const intervalRef = useRef(null);

  const scrambleTo = (targetIdx) => {
    const target = words[targetIdx];
    let iteration = 0;
    clearInterval(intervalRef.current);
    intervalRef.current = setInterval(() => {
      setDisplay(target.split('').map((ch, i) => {
        if (ch === ' ') return ' ';
        if (i < iteration) return target[i];
        return chars[Math.floor(Math.random() * chars.length)];
      }).join(''));
      iteration += 1/2;
      if (iteration >= target.length) {
        clearInterval(intervalRef.current);
        setDisplay(target);
      }
    }, 30);
  };

  const handleEnter = () => {
    setHovering(true);
    targetRef.current = (targetRef.current + 1) % words.length;
    scrambleTo(targetRef.current);
  };
  const handleLeave = () => {
    setHovering(false);
  };

  useEffect(() => { return () => clearInterval(intervalRef.current); }, []);

  return (
    <div onMouseEnter={handleEnter} onMouseLeave={handleLeave}
      style={{ fontSize:'11px',fontWeight:500,letterSpacing:'0.16em',color:'var(--text-secondary)',cursor:'default',fontFamily:'monospace',transition:'color 0.2s',userSelect:'none' }}>
      {display}
    </div>
  );
}

function ThemeToggle({ theme, setTheme }) {

      <span style={{ fontSize:'14px' }}>{theme === 'dark' ? '\u263E' : '\u2600'}</span>
      {theme === 'dark' ? 'Light mode' : 'Dark mode'}
    </button>
  );
}

function SidebarViewItem({ view, isActive, isChild, isExpanded, hasChildren, onToggle, onClick, onRename, onDragStart, onDragOver, onDrop, onDragEnd, dragOverId, onNestUnder, onUnnest, allTopLevel }) {
  const [editing, setEditing] = useState(false);
  const [editLabel, setEditLabel] = useState(view.label);
  const [ctx, setCtx] = useState(null);
  const inputRef = useRef(null);
  useEffect(() => { if (editing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); } }, [editing]);
  const saveRename = () => { if (editLabel.trim() && editLabel.trim() !== view.label) onRename(view.id, editLabel.trim()); setEditing(false); };

  // Build context menu options
  const ctxOptions = [
    { icon:'✎', label:'Rename', action:() => { setEditing(true); setEditLabel(view.label); } },
  ];
  if (isChild) {
    ctxOptions.push({ icon:'↑', label:'Move to top level', action:() => onUnnest(view.id) });
  }
  // Offer nesting under other top-level views
  const nestTargets = (allTopLevel||[]).filter(t => t.id !== view.id && t.id !== view.parent);
  if (nestTargets.length > 0 && !isChild) {
    nestTargets.forEach(t => {
      ctxOptions.push({ icon:'↳', label:`Nest under ${t.label}`, action:() => onNestUnder(view.id, t.id) });
    });
  }

  return (
    <>
    <div
      draggable={!editing}
      onDragStart={e => { e.dataTransfer.setData('text/plain', view.id); onDragStart(view.id); }}
      onDragOver={e => { e.preventDefault(); onDragOver(view.id); }}
      onDrop={e => { e.preventDefault(); onDrop(view.id, e); }}
      onDragEnd={onDragEnd}
      onClick={() => { if (!editing) onClick(view.id); }}
      onDoubleClick={e => { e.stopPropagation(); setEditing(true); setEditLabel(view.label); }}
      onContextMenu={e => { e.preventDefault(); e.stopPropagation(); setCtx({ x: e.clientX, y: e.clientY }); }}
      style={{
        display:'flex', alignItems:'center', gap:'2px',
        padding: isChild ? '5px 10px 5px 22px' : '7px 10px',
        width:'100%', background: isActive ? 'var(--surface-hover)' : (dragOverId === view.id ? 'var(--surface)' : 'transparent'),
        border:'none', borderRadius:'var(--radius-sm)', cursor: editing ? 'text' : 'grab',
        color: isActive ? 'var(--text)' : 'var(--text-secondary)',
        fontSize: isChild ? '12px' : '13px', fontWeight: isActive ? 500 : 400, textAlign:'left',
        transition:'background 0.1s, border-color 0.1s',
        borderTop: dragOverId === view.id ? '2px solid var(--green)' : '2px solid transparent',
        marginTop: dragOverId === view.id ? '2px' : '0',
        boxShadow: dragOverId === view.id ? '0 -4px 8px -2px rgba(16,185,129,0.15)' : 'none',
      }}>
      {hasChildren && (
        <span onClick={e => { e.stopPropagation(); onToggle(view.id); }}
          style={{ fontSize:'13px', color:'var(--text-secondary)', cursor:'pointer', width:'16px', height:'16px', display:'inline-flex', alignItems:'center', justifyContent:'center', transition:'transform 0.15s, color 0.15s', transform: isExpanded ? 'rotate(90deg)' : 'rotate(0deg)', flexShrink:0, userSelect:'none', borderRadius:'3px' }}
          onMouseEnter={e => e.currentTarget.style.color='var(--text)'}
          onMouseLeave={e => e.currentTarget.style.color='var(--text-secondary)'}>
          ▸
        </span>
      )}
      {editing ? (
        <input ref={inputRef} value={editLabel} onChange={e => setEditLabel(e.target.value)}
          onClick={e => e.stopPropagation()}
          onKeyDown={e => { if (e.key === 'Enter') saveRename(); if (e.key === 'Escape') setEditing(false); }}
          onBlur={saveRename}
          style={{ fontSize: isChild ? '12px' : '13px', width:'100%', padding:'0', background:'transparent', border:'none', color:'var(--text)', outline:'none' }} />
      ) : (
        <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{view.label}</span>
      )}
